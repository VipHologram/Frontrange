<body>
<div id="root">
  <div class="app-loader" id="app-loader">
    <div class="app-loader-brand">FabricFlow Pro</div>
    <div class="app-loader-sub">Loading your workspace...</div>
    <div class="loader-bar"><div class="loader-bar-inner"></div></div>
  </div>
</div>
<div id="toast-root"></div>

<script>
// FABRICFLOW PRO - BUG FIXES: theme persistence + pending user visibility for admin
const esc = s => { if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
const san = (s, n=200) => s ? String(s).trim().slice(0,n) : '';
const uid = () => crypto.randomUUID ? crypto.randomUUID() : (Date.now().toString(36)+Math.random().toString(36).substr(2));
const genSalt = () => { const a=new Uint8Array(16); crypto.getRandomValues(a); return Array.from(a,b=>b.toString(16).padStart(2,'0')).join(''); };
const hashPass = async (p,s) => { const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(p+s)); return Array.from(new Uint8Array(b),x=>x.toString(16).padStart(2,'0')).join(''); };
const validMob = m => /^[6-9][0-9]{9}$/.test(m);
const validEmail = e => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
function showToast(msg,type='ok'){ const el=document.createElement('div'); el.className=`toast toast-${type}`; el.textContent=msg; document.getElementById('toast-root').appendChild(el); setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),300);},2600); }
const ROLE_LABELS = {admin:'Admin',subadmin:'Sub Admin',broker:'Broker/Agent',customer:'Customer'};
const isAdmin = () => CU?.role === 'admin';
const canEdit = () => CU?.role === 'admin';

let DB={users:[],fabrics:[],logs:[],company:'FabricFlow'};
let CU=null, PAGE='dashboard', STOCK={}, IMGS={}, isDark=true;

// THEME FIX: properly apply data-theme attribute + override CSS variables
function applyTheme(){
  const saved = localStorage.getItem('ff_theme');
  isDark = saved !== null ? saved === 'dark' : true;
  if(isDark) document.documentElement.setAttribute('data-theme', 'dark');
  else document.documentElement.setAttribute('data-theme', 'light');
}
function toggleTheme(){ 
  isDark = !isDark; 
  localStorage.setItem('ff_theme', isDark ? 'dark' : 'light'); 
  applyTheme(); 
  renderApp(); 
}
applyTheme();

function scheduleSave(){
  localStorage.setItem('ff_users', JSON.stringify(DB.users));
  localStorage.setItem('ff_fabrics', JSON.stringify(DB.fabrics));
  localStorage.setItem('ff_logs', JSON.stringify(DB.logs.slice(0,500)));
  localStorage.setItem('ff_company', DB.company);
  localStorage.setItem('ff_stock', JSON.stringify(STOCK));
  localStorage.setItem('ff_imgs', JSON.stringify(IMGS));
}
function addLog(action,details){ DB.logs.unshift({id:uid(),userId:CU?.id||'sys',userName:CU?.fullName||'System',action,details,time:new Date().toLocaleString()}); if(DB.logs.length>500) DB.logs=DB.logs.slice(0,500); scheduleSave(); }

function loadFromLocalStorage(){
  try{
    const u=localStorage.getItem('ff_users'); if(u) DB.users=JSON.parse(u);
    const f=localStorage.getItem('ff_fabrics'); if(f) DB.fabrics=JSON.parse(f);
    const l=localStorage.getItem('ff_logs'); if(l) DB.logs=JSON.parse(l);
    const c=localStorage.getItem('ff_company'); if(c) DB.company=c;
    const s=localStorage.getItem('ff_stock'); if(s) STOCK=JSON.parse(s);
    const i=localStorage.getItem('ff_imgs'); if(i) IMGS=JSON.parse(i);
    return true;
  } catch(e){ return false; }
}

async function initDB(){
  loadFromLocalStorage();
  if(DB.users.length === 0){
    const salt=genSalt(); const hash=await hashPass('admin123',salt);
    DB.users=[{id:uid(),fullName:'Master Admin',mobile:'9999999999',email:'admin@fabricflow.com',password:hash,salt,role:'admin',status:'approved',createdAt:new Date().toLocaleString()}];
    scheduleSave();
  }
  const sess = sessionStorage.getItem('ffs');
  if(sess && !CU){ try{ const d=JSON.parse(sess); const f=DB.users.find(u=>u.id===d.id && u.status==='approved'); if(f) CU=f; } catch(e){} }
  const loader = document.getElementById('app-loader'); if(loader) loader.remove();
  renderApp();
}

async function doLogin(){
  const id=document.getElementById('l-id').value.trim();
  const pw=document.getElementById('l-pw').value;
  const err=document.getElementById('l-err'); err.classList.remove('on');
  if(!id||!pw){ err.textContent='All fields required'; err.classList.add('on'); return; }
  const user=DB.users.find(u=>u.mobile===id||u.email===id);
  if(!user){ err.textContent='User not found'; err.classList.add('on'); return; }
  if(user.status!=='approved'){ err.textContent=user.status==='pending'?'⏳ Pending admin approval': 'Account deactivated'; err.classList.add('on'); return; }
  const hash=await hashPass(pw,user.salt);
  if(hash!==user.password){ err.textContent='Wrong password'; err.classList.add('on'); return; }
  CU=user; sessionStorage.setItem('ffs',JSON.stringify({id:user.id})); addLog('LOGIN',user.role); PAGE='dashboard'; renderApp(); showToast(`Welcome ${CU.fullName}`);
}

async function doRegister(){
  const name=san(document.getElementById('r-name').value,100);
  const mob=san(document.getElementById('r-mob').value,10);
  const email=san(document.getElementById('r-email').value,100);
  const pw=document.getElementById('r-pw').value;
  const role=document.getElementById('r-role').value;
  const err=document.getElementById('r-err'); err.classList.remove('on');
  if(!name||!mob||!pw){ err.textContent='All fields required'; err.classList.add('on'); return; }
  if(!validMob(mob)){ err.textContent='Invalid mobile'; err.classList.add('on'); return; }
  if(email&&!validEmail(email)){ err.textContent='Invalid email'; err.classList.add('on'); return; }
  if(pw.length<6){ err.textContent='Min 6 characters'; err.classList.add('on'); return; }
  if(DB.users.find(u=>u.mobile===mob)){ err.textContent='Mobile already registered'; err.classList.add('on'); return; }
  const salt=genSalt(), hash=await hashPass(pw,salt);
  DB.users.push({id:uid(),fullName:name,mobile:mob,email:email||'',password:hash,salt,role,status:'pending',createdAt:new Date().toLocaleString()});
  scheduleSave(); addLog('REGISTER',`${name} as ${role} (pending)`); showToast('Registered! Awaiting admin approval.');
  switchAuthTab('login'); renderApp();
}
function logout(){ sessionStorage.removeItem('ffs'); CU=null; renderApp(); }
function switchAuthTab(t){ const lf=document.getElementById('lf'); const rf=document.getElementById('rf'); if(lf) lf.style.display=t==='login'?'block':'none'; if(rf) rf.style.display=t==='register'?'block':'none'; document.querySelectorAll('.tab-btn').forEach(el=>el.classList.toggle('on',el.dataset.tab===t)); }
function approveUser(id){ const u=DB.users.find(u=>u.id===id); if(u){u.status='approved';scheduleSave();addLog('APPROVE',u.fullName);showToast(`✅ ${u.fullName} approved`);renderApp();} }
function rejectUser(id){ const u=DB.users.find(u=>u.id===id); DB.users=DB.users.filter(u=>u.id!==id); scheduleSave(); addLog('REJECT',u?.fullName||id); showToast(`❌ ${u?.fullName} rejected`,'err'); renderApp(); }
function deactivateUser(id){ const u=DB.users.find(u=>u.id===id); if(u&&u.role!=='admin'){u.status='inactive';scheduleSave();addLog('DEACTIVATE',u.fullName);showToast(`${u.fullName} deactivated`);renderApp();} }
function activateUser(id){ const u=DB.users.find(u=>u.id===id); if(u){u.status='approved';scheduleSave();addLog('ACTIVATE',u.fullName);showToast(`${u.fullName} activated`);renderApp();} }

function getStockFor(name){ if(!name) return null; const u=name.toUpperCase().trim(); return STOCK[u] || null; }
function updateStockQuantity(fabricName, newQty){ if(!isAdmin()) return; const qty=parseInt(newQty)||0; const up=fabricName.toUpperCase().trim(); if(STOCK[up]){ STOCK[up][0].qty = qty; } else { STOCK[up] = [{ design: 'MAIN', qty, unit: 'Rolls', comment: '' }]; } scheduleSave(); addLog('UPDATE_STOCK',`${fabricName} → ${qty}`); showToast(`${fabricName} stock updated`); renderApp(); }
function addFabric(d){ if(!d.sn||!d.name){ showToast('SN & Name required','err'); return false; } if(DB.fabrics.some(f=>f.sn===d.sn || f.name.toLowerCase()===d.name.toLowerCase())){ showToast('Duplicate','err'); return false; } DB.fabrics.push({id:uid(), sn:san(d.sn,20), name:san(d.name,80), cat:san(d.cat||'',50), gsm:san(d.gsm||'',30), width:san(d.width||'',30), comp:san(d.comp||'',100), hf:san(d.hf||'',20), rate:san(d.rate||'',30)}); scheduleSave(); addLog('ADD_FABRIC',`${d.sn} - ${d.name}`); showToast(`Added ${d.name}`); renderApp(); return true; }
function deleteFabric(id){ const f=DB.fabrics.find(f=>f.id===id); if(f && confirm(`Delete "${f.name}"?`)){ DB.fabrics=DB.fabrics.filter(f=>f.id!==id); delete IMGS[id]; scheduleSave(); addLog('DELETE_FABRIC',f.name); showToast(`Deleted ${f.name}`,'err'); renderApp(); } }
const getImages = id => IMGS[id]||[];
function saveImages(id,urls){ const valid=urls.map(u=>san(u,500)).filter(u=>u.startsWith('http')); if(valid.length) IMGS[id]=valid; else delete IMGS[id]; scheduleSave(); }
function getCategoryList(){ const used=[...new Set(DB.fabrics.map(f=>f.cat||'').filter(Boolean))]; const adminCats=JSON.parse(localStorage.getItem('ff_cats')||'[]'); const all=[...new Set([...adminCats,...used])].sort(); return all.length ? all : ['Suiting','Shirting','Ladies','Children']; }
function showAddFabricModal(){ if(!canEdit()) return; const cats=getCategoryList(); openModal(`<div class="modal-box"><div class="modal-title">Add Fabric</div><div class="modal-fld"><label>SN *</label><input id="add-sn"></div><div class="modal-fld"><label>Name *</label><input id="add-name"></div><div class="modal-fld"><label>Category</label><input id="add-cat" list="cat-list-dl"><datalist id="cat-list-dl">${cats.map(x=>`<option value="${esc(x)}">`).join('')}</datalist></div><div class="modal-fld"><label>GSM</label><input id="add-gsm"></div><div class="modal-fld"><label>Width</label><input id="add-width"></div><div class="modal-fld"><label>Composition</label><input id="add-comp"></div><div class="modal-fld"><label>Rate</label><input id="add-rate"></div><div><div style="display:flex;justify-content:space-between"><span>Images</span><button class="btn btn-sm btn-sky" onclick="addImageRow()">+ URL</button></div><div id="img-url-list"></div></div><div class="modal-foot"><button class="btn btn-gold" onclick="submitAddFabric()">Create</button><button class="btn btn-ghost" onclick="closeModal()">Cancel</button></div></div>`); }
function submitAddFabric(){ const ok=addFabric({ sn:document.getElementById('add-sn')?.value.trim(), name:document.getElementById('add-name')?.value.trim(), cat:document.getElementById('add-cat')?.value, gsm:document.getElementById('add-gsm')?.value, width:document.getElementById('add-width')?.value, comp:document.getElementById('add-comp')?.value, hf:'', rate:document.getElementById('add-rate')?.value }); if(ok){ const _nf=DB.fabrics[DB.fabrics.length-1]; const l=document.getElementById('img-url-list'); const urls=[]; if(l) l.querySelectorAll('input').forEach(i=>{const v=(i.value||'').trim();if(v.startsWith('http'))urls.push(v);}); if(urls.length) saveImages(_nf.id,urls); closeModal(); renderApp(); } }

function saveEditFabric(id){ const sn=document.getElementById('ed-sn')?.value.trim(); const name=document.getElementById('ed-name')?.value.trim(); if(!sn||!name){ showToast('SN/Name required','err'); return; } const i=DB.fabrics.findIndex(f=>f.id===id); if(i!==-1){ DB.fabrics[i]={...DB.fabrics[i], sn, name, cat:document.getElementById('ed-cat')?.value||'', gsm:document.getElementById('ed-gsm')?.value||'', width:document.getElementById('ed-width')?.value||'', comp:document.getElementById('ed-comp')?.value||'', hf:DB.fabrics[i].hf, rate:document.getElementById('ed-rate')?.value||''}; const l=document.getElementById('img-url-list'); const urls=[]; if(l) l.querySelectorAll('input').forEach(inp=>{const v=san(inp.value,500);if(v&&v.startsWith('http'))urls.push(v);}); saveImages(id,urls); scheduleSave(); addLog('EDIT_FABRIC',`${sn} - ${name}`); showToast('Fabric updated'); renderApp(); } closeModal(); }

function exportFabricsCSV(){ const rows=DB.fabrics.map(f=>[f.sn,f.name,f.gsm,f.width,f.comp,f.hf,f.rate,f.cat||''].map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')); const csv='\uFEFF'+['SN,NAME,GSM,WIDTH,COMPOSITION,HF,RATE,CATEGORY',...rows].join('\n'); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download=`fabrics_${Date.now()}.csv`; a.click(); showToast(`Exported ${DB.fabrics.length} fabrics`); }
