<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FabricFlow Pro | Complete Fabric Management ERP</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#08090d;--surface:#0f1118;--s2:#161b26;--s3:#1e2535;
  --border:#252d3d;--border2:#2e3a52;
  --gold:#e8a020;--gold2:#f5c040;--gold-dim:rgba(232,160,32,.12);
  --green:#27c98a;--red:#f04d4d;--blue:#4b8cf7;--sky:#22c4e8;--purple:#9b6dff;
  --text:#eef2f8;--t2:#8896ae;--t3:#4f5e73;
  --shadow:0 8px 40px rgba(0,0,0,.5);
  --r:16px;--rs:10px;
}
[data-theme=light]{
  --bg:#f0f2f7;--surface:#fff;--s2:#f5f7fb;--s3:#eaeef5;
  --border:#dde3ee;--border2:#c8d1e0;
  --gold:#c47a00;--gold2:#d98f10;--gold-dim:rgba(196,122,0,.1);
  --green:#12a368;--red:#d63030;--blue:#2563eb;--sky:#0898b8;--purple:#7c3aed;
  --text:#0c1220;--t2:#3d4e63;--t3:#8696ae;
  --shadow:0 8px 40px rgba(0,0,0,.1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}

.auth-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg);position:relative}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:28px;padding:44px 40px;width:100%;max-width:420px;box-shadow:var(--shadow);position:relative;z-index:1}
.auth-brand{font-family:'Fraunces',serif;font-size:2rem;color:var(--gold);text-align:center}
.auth-tagline{text-align:center;color:var(--t3);font-size:.75rem;margin-bottom:28px}
.tab-strip{display:flex;gap:4px;background:var(--bg);border-radius:40px;padding:4px;margin-bottom:24px}
.tab-btn{flex:1;padding:8px;border:none;background:transparent;color:var(--t2);font-weight:600;border-radius:30px;cursor:pointer}
.tab-btn.on{background:var(--gold);color:#000}
.fld{margin-bottom:13px}
.fld label{display:block;font-size:.67rem;font-weight:700;text-transform:uppercase;color:var(--t3);margin-bottom:5px}
.fld input,.fld select{width:100%;padding:10px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);outline:none}
.auth-btn{width:100%;padding:11px;background:var(--gold);border:none;border-radius:30px;font-weight:700;color:#000;cursor:pointer;margin-top:8px}
.err-msg{font-size:.73rem;color:var(--red);margin-top:6px;display:none;padding:7px 12px;background:rgba(240,77,77,.09);border-radius:8px}
.err-msg.on{display:block}

.sidebar{width:256px;background:var(--surface);border-right:1px solid var(--border);position:fixed;height:100vh;z-index:200;overflow-y:auto;transition:transform .25s}
.sb-head{padding:22px 20px 18px;border-bottom:1px solid var(--border)}
.sb-brand{font-family:'Fraunces',serif;font-size:1.28rem;color:var(--gold)}
.sb-co{font-size:.67rem;display:block;color:var(--t3)}
.sb-nav{padding:10px 8px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;color:var(--t2);font-weight:500;cursor:pointer;margin-bottom:2px;position:relative}
.nav-item:hover{background:var(--s2);color:var(--text)}
.nav-item.on{background:var(--gold-dim);color:var(--gold)}
.nav-item.on::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;background:var(--gold);border-radius:0 3px 3px 0}
.nav-icon{font-size:1rem;width:20px;text-align:center}
.nav-badge{background:var(--red);color:#fff;font-size:.62rem;border-radius:20px;padding:1px 6px;margin-left:auto}
.sb-foot{padding:16px;border-top:1px solid var(--border)}
.theme-pill{background:var(--s2);border:1px solid var(--border);width:100%;padding:7px;border-radius:30px;margin-bottom:12px;cursor:pointer;font-weight:600;color:var(--t2);text-align:center}
.user-row{display:flex;align-items:center;gap:9px}
.uavatar{width:34px;height:34px;background:linear-gradient(135deg,var(--gold),#c47a00);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#000}
.uname{font-size:.78rem;font-weight:600;color:var(--text)}
.urole{font-size:.63rem;color:var(--t3)}
.exit-btn{background:transparent;border:1px solid var(--border);color:var(--t3);padding:5px 9px;border-radius:8px;cursor:pointer;margin-left:auto}
.main{margin-left:256px;flex:1;padding:28px 32px}

.page-head{margin-bottom:24px}
.page-title{font-family:'Fraunces',serif;font-size:1.85rem;color:var(--text)}
.page-sub{color:var(--t3);font-size:.78rem;margin-top:3px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:14px;margin-bottom:24px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:18px}
.kpi-label{font-size:.65rem;font-weight:700;text-transform:uppercase;color:var(--t3);margin-bottom:6px}
.kpi-val{font-size:2rem;font-weight:800;font-family:'Fraunces',serif}
.gold{color:var(--gold)}.grn{color:var(--green)}.blu{color:var(--blue)}.sky{color:var(--sky)}.rd{color:var(--red)}.prp{color:var(--purple)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:22px;margin-bottom:18px}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.card-title{font-size:.9rem;font-weight:700;color:var(--text)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:24px;font-weight:600;font-size:.74rem;border:none;cursor:pointer}
.btn-gold{background:var(--gold);color:#000}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--t2)}
.btn-green{background:rgba(39,201,138,.1);color:var(--green);border:1px solid rgba(39,201,138,.22)}
.btn-red{background:rgba(240,77,77,.1);color:var(--red);border:1px solid rgba(240,77,77,.22)}
.btn-blue{background:rgba(75,140,247,.1);color:var(--blue);border:1px solid rgba(75,140,247,.22)}
.btn-sky{background:rgba(34,196,232,.1);color:var(--sky);border:1px solid rgba(34,196,232,.22)}
.btn-sm{padding:4px 10px;font-size:.7rem}
.btn-row{display:flex;flex-wrap:wrap;gap:5px}
.search-wrap{position:relative;margin-bottom:16px;display:flex;gap:10px}
.search-wrap input{width:100%;padding:10px 14px 10px 38px;background:var(--bg);border:1.5px solid var(--border);border-radius:30px;color:var(--text);outline:none}
.search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--t3)}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px 10px;font-size:.7rem;text-transform:uppercase;color:var(--t3);border-bottom:2px solid var(--border)}
td{padding:12px 10px;border-bottom:1px solid var(--border);color:var(--t2);font-size:.82rem}
tr:hover td{background:var(--s2)}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.67rem;font-weight:700}
.b-admin{background:rgba(240,77,77,.1);color:var(--red)}
.b-subadmin{background:rgba(155,109,255,.1);color:var(--purple)}
.b-broker{background:rgba(75,140,247,.1);color:var(--blue)}
.b-pending{background:rgba(232,160,32,.1);color:var(--gold)}
.b-approved{background:rgba(39,201,138,.1);color:var(--green)}
.sdot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px}
.d-green{background:#16a34a}.d-orange{background:#ea580c}.d-red{background:#dc2626}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:24px;width:100%;max-width:660px;max-height:90vh;overflow-y:auto;padding:28px}
.modal-title{font-family:'Fraunces',serif;font-size:1.3rem;margin-bottom:18px;color:var(--text)}
.modal-fld{margin-bottom:11px}
.modal-fld label{display:block;font-size:.64rem;font-weight:700;text-transform:uppercase;color:var(--t3);margin-bottom:4px}
.modal-fld input{width:100%;padding:9px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;color:var(--text);outline:none}
.modal-foot{display:flex;gap:9px;margin-top:20px}
.modal-foot .btn{flex:1;justify-content:center;padding:10px}
.info-box{background:rgba(232,160,32,.06);border:1px solid rgba(232,160,32,.18);border-radius:10px;padding:11px 14px;font-size:.76rem;color:var(--t2);margin-bottom:14px}
#toast-root{position:fixed;bottom:20px;left:0;right:0;z-index:9999;display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none}
.toast{padding:9px 20px;border-radius:30px;font-size:.8rem;font-weight:600;box-shadow:var(--shadow);animation:rise .2s ease;border:1px solid var(--border);background:var(--surface);color:var(--text)}
.toast-ok{background:rgba(39,201,138,.12);border-color:rgba(39,201,138,.3);color:var(--green)}
.toast-err{background:rgba(240,77,77,.12);border-color:rgba(240,77,77,.3);color:var(--red)}
.stock-input{width:80px;padding:5px 8px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--text);text-align:center}
.url-text{font-family:monospace;font-size:13px;word-break:break-all;background:var(--surface);padding:10px;border-radius:6px;margin:10px 0;border:1px solid var(--border)}
.hamburger{display:none;position:fixed;top:13px;left:13px;z-index:300;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:7px 10px;cursor:pointer}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:199}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:820px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sb-overlay.open{display:block}
  .main{margin-left:0;padding:60px 14px 18px}
  .hamburger{display:flex}
}
</style>
</head>
<body>
<div id="root"></div>
<div id="toast-root"></div>

<script>
// ============================================================
// FABRICFLOW PRO - COMPLETE ERP SYSTEM
// Supports JSON format with "Item Name", "Design / Color No", "Quantity"
// ============================================================

const esc = s => { if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
const san = (s, n=200) => s ? String(s).trim().slice(0,n) : '';
const uid = () => crypto.randomUUID ? crypto.randomUUID() : (Date.now().toString(36)+Math.random().toString(36).substr(2));
const genSalt = () => { const a=new Uint8Array(16); crypto.getRandomValues(a); return Array.from(a,b=>b.toString(16).padStart(2,'0')).join(''); };
const hashPass = async (p,s) => { const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(p+s)); return Array.from(new Uint8Array(b),x=>x.toString(16).padStart(2,'0')).join(''); };
const validMob = m => /^[6-9][0-9]{9}$/.test(m);
function showToast(msg,type='ok'){
  const el=document.createElement('div'); el.className=`toast toast-${type}`; el.textContent=msg;
  document.getElementById('toast-root').appendChild(el);
  setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),300);},2600);
}

let DB={users:[],fabrics:[],logs:[],company:'FabricFlow'};
let CU=null, PAGE='dashboard', STOCK={}, GH_URL='', GH_SHA='', isDark=true;

// Default admin creation
async function createDefaultAdmin(){
  const salt=genSalt(), hash=await hashPass('admin123',salt);
  DB.users=[{id:uid(),fullName:'Master Admin',mobile:'9999999999',email:'admin@fabricflow.com',password:hash,salt,role:'admin',status:'approved',createdAt:new Date().toLocaleString()}];
  saveToLocal();
}

function saveToLocal(){
  localStorage.setItem('ff_users', JSON.stringify(DB.users));
  localStorage.setItem('ff_fabrics', JSON.stringify(DB.fabrics));
  localStorage.setItem('ff_logs', JSON.stringify(DB.logs));
  localStorage.setItem('ff_company', DB.company);
  localStorage.setItem('ff_stock', JSON.stringify(STOCK));
  localStorage.setItem('ff_gh_url', GH_URL);
  localStorage.setItem('ff_gh_sha', GH_SHA);
  localStorage.setItem('ff_theme', isDark ? 'dark' : 'light');
}

function loadFromLocal(){
  const users = localStorage.getItem('ff_users');
  if(users) DB.users = JSON.parse(users);
  if(!DB.users.length) createDefaultAdmin();
  DB.fabrics = JSON.parse(localStorage.getItem('ff_fabrics') || '[]');
  DB.logs = JSON.parse(localStorage.getItem('ff_logs') || '[]');
  DB.company = localStorage.getItem('ff_company') || 'FabricFlow';
  STOCK = JSON.parse(localStorage.getItem('ff_stock') || '{}');
  GH_URL = localStorage.getItem('ff_gh_url') || '';
  GH_SHA = localStorage.getItem('ff_gh_sha') || '';
  isDark = localStorage.getItem('ff_theme') !== 'light';
  applyTheme();
}

function addLog(action,details){
  DB.logs.unshift({id:uid(),userId:CU?.id||'sys',userName:CU?.fullName||'System',action,details,time:new Date().toLocaleString()});
  if(DB.logs.length>500) DB.logs=DB.logs.slice(0,500);
  localStorage.setItem('ff_logs', JSON.stringify(DB.logs));
}

function applyTheme(){ document.documentElement.setAttribute('data-theme', isDark?'dark':'light'); }
function toggleTheme(){ isDark=!isDark; applyTheme(); saveToLocal(); renderApp(); }

// ========== STOCK PARSING - SUPPORTS YOUR JSON FORMAT ==========
function parseStockJSON(json){
  if(!Array.isArray(json)) throw new Error('Expected JSON array');
  const stock={};
  json.forEach(row=>{
    let name = row.fabric || row.Fabric || row["Item Name"] || row["ITEM NAME"];
    let design = row.design || row.Design || row["Design / Color No"] || row["DESIGN / COLOR NO"];
    let qty = row.qty || row.Qty || row.Quantity || row["Quantity"];
    let unit = row.unit || row.Unit || "Rolls";
    let comment = row.comment || row.Comment || "";
    if(!name) return;
    name = name.toString().trim().toUpperCase();
    design = design ? design.toString().trim() : "MAIN";
    qty = parseFloat(qty) || 0;
    if(!stock[name]) stock[name]=[];
    stock[name].push({design, qty, unit, comment});
  });
  return stock;
}

async function fetchGitHubStock(){
  if(!GH_URL) return false;
  try{
    const url = GH_URL.includes('?') ? GH_URL+'&_t='+Date.now() : GH_URL+'?_t='+Date.now();
    const r = await fetch(url, {cache:'no-cache'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const text = await r.text();
    const json = JSON.parse(text);
    const newStock = parseStockJSON(json);
    if(Object.keys(newStock).length){
      STOCK = newStock;
      saveToLocal();
      addLog('STOCK_SYNC', `Loaded ${Object.keys(STOCK).length} fabric types from GitHub`);
      renderApp();
      return true;
    }
    return false;
  }catch(e){
    addLog('STOCK_SYNC_ERR', e.message);
    return false;
  }
}

async function saveAndFetchGitHub(){
  const url = document.getElementById('gh-url-inp')?.value.trim();
  if(!url){ showToast('Enter GitHub raw URL','err'); return; }
  const btn = document.getElementById('gh-fetch-btn');
  if(btn){ btn.disabled=true; btn.textContent='Fetching…'; }
  try{
    const fetchUrl = url.includes('?') ? url+'&_t='+Date.now() : url+'?_t='+Date.now();
    const r = await fetch(fetchUrl, {cache:'no-cache'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const text = await r.text();
    const json = JSON.parse(text);
    const newStock = parseStockJSON(json);
    if(!Object.keys(newStock).length) throw new Error('No fabric data found');
    
    let hash=0;
    for(let i=0;i<Math.min(text.length,2000);i++) hash=((hash<<5)-hash)+text.charCodeAt(i)|0;
    GH_SHA = String(hash);
    GH_URL = url;
    STOCK = newStock;
    saveToLocal();
    addLog('GH_CONNECT', `Loaded ${Object.keys(STOCK).length} fabric types`);
    showToast(`✓ Loaded ${Object.keys(STOCK).length} fabric types`);
    renderApp();
  }catch(e){
    showToast('Error: '+e.message,'err');
    addLog('GH_ERR', e.message);
  } finally {
    if(btn){ btn.disabled=false; btn.textContent='Connect & Fetch'; }
  }
}

function clearGitHubUrl(){
  GH_URL=''; GH_SHA='';
  saveToLocal();
  addLog('GH_DISCONNECT','GitHub URL disconnected');
  showToast('GitHub URL disconnected');
  renderApp();
}

function getStockFor(name){
  if(!name) return null;
  const u=name.toUpperCase().trim();
  if(STOCK[u]) return STOCK[u];
  const k=Object.keys(STOCK).find(k=>k===u||k.includes(u)||u.includes(k));
  return k?STOCK[k]:null;
}

// ========== FABRIC CRUD ==========
function getCategoryList(){
  const used=[...new Set(DB.fabrics.map(f=>f.cat||'').filter(Boolean))];
  return used.length ? used : ['Suiting','Shirting','Ladies','Children'];
}

function addFabric(d){
  if(!d.sn||!d.name){ showToast('SN & Name required','err'); return false; }
  if(DB.fabrics.some(f=>f.sn===d.sn || f.name.toLowerCase()===d.name.toLowerCase())){ 
    showToast('Duplicate SN or Name','err'); return false; 
  }
  DB.fabrics.push({id:uid(), sn:san(d.sn,20), name:san(d.name,80), cat:san(d.cat||'',50), 
    gsm:san(d.gsm||'',30), width:san(d.width||'',30), comp:san(d.comp||'',100), 
    hf:san(d.hf||'',20), rate:san(d.rate||'',30)});
  saveToLocal(); addLog('ADD_FABRIC',`${d.sn} - ${d.name}`);
  showToast(`Added ${d.name}`);
  renderApp(); return true;
}

function updateFabric(id,d){
  const i=DB.fabrics.findIndex(f=>f.id===id);
  if(i!==-1){ 
    DB.fabrics[i]={...DB.fabrics[i], ...d}; 
    saveToLocal(); addLog('EDIT_FABRIC',`${d.sn} - ${d.name}`); 
    showToast('Fabric updated'); renderApp(); 
  }
}

function deleteFabric(id){
  const f=DB.fabrics.find(f=>f.id===id);
  if(f && confirm(`Delete "${f.name}"?`)){
    DB.fabrics=DB.fabrics.filter(f=>f.id!==id);
    saveToLocal(); addLog('DELETE_FABRIC',f.name);
    showToast(`Deleted ${f.name}`,'err');
    renderApp();
  }
}

function updateStockQuantity(fabricName, newQty){
  const qty=parseInt(newQty) || 0;
  const up=fabricName.toUpperCase().trim();
  if(STOCK[up]){ STOCK[up][0].qty = qty; }
  else { STOCK[up] = [{ design: 'MAIN', qty: qty, unit: 'Rolls', comment: '' }]; }
  saveToLocal();
  addLog('UPDATE_STOCK', `${fabricName} → ${qty} Rolls`);
  showToast(`${fabricName} stock updated to ${qty}`);
  renderApp();
}

// ========== USER MANAGEMENT ==========
function approveUser(id){ 
  const u=DB.users.find(u=>u.id===id); 
  if(u){ u.status='approved'; saveToLocal(); addLog('APPROVE',u.fullName); showToast(`Approved ${u.fullName}`); renderApp(); } 
}
function rejectUser(id){ 
  const u=DB.users.find(u=>u.id===id); 
  DB.users=DB.users.filter(u=>u.id!==id); saveToLocal(); addLog('REJECT',u?.fullName||id); showToast('User rejected','err'); renderApp(); 
}
function deactivateUser(id){ 
  const u=DB.users.find(u=>u.id===id); 
  if(u && u.role!=='admin'){ u.status='inactive'; saveToLocal(); addLog('DEACTIVATE',u.fullName); showToast(`${u.fullName} deactivated`); renderApp(); } 
}
function activateUser(id){ 
  const u=DB.users.find(u=>u.id===id); 
  if(u){ u.status='approved'; saveToLocal(); addLog('ACTIVATE',u.fullName); showToast(`${u.fullName} activated`); renderApp(); } 
}

// ========== AUTH ==========
async function doLogin(){
  const id=document.getElementById('l-id').value.trim();
  const pw=document.getElementById('l-pw').value;
  const err=document.getElementById('l-err'); err.classList.remove('on');
  const user=DB.users.find(u=>u.mobile===id || u.email===id);
  if(!user){ err.textContent='User not found'; err.classList.add('on'); return; }
  if(user.status!=='approved'){ err.textContent='Account not approved'; err.classList.add('on'); return; }
  const hash=await hashPass(pw,user.salt);
  if(hash!==user.password){ err.textContent='Wrong password'; err.classList.add('on'); return; }
  CU=user; sessionStorage.setItem('ffs',JSON.stringify({id:user.id}));
  addLog('LOGIN',user.role);
  PAGE='dashboard';
  renderApp();
}

async function doRegister(){
  const name=san(document.getElementById('r-name').value,100);
  const mob=san(document.getElementById('r-mob').value,10);
  const email=san(document.getElementById('r-email').value,100);
  const pw=document.getElementById('r-pw').value;
  const role=document.getElementById('r-role').value;
  const err=document.getElementById('r-err'); err.classList.remove('on');
  if(!name||!mob||!pw){ err.textContent='Name, mobile and password required'; err.classList.add('on'); return; }
  if(!validMob(mob)){ err.textContent='Invalid mobile'; err.classList.add('on'); return; }
  if(pw.length<6){ err.textContent='Password min 6 characters'; err.classList.add('on'); return; }
  if(DB.users.find(u=>u.mobile===mob)){ err.textContent='Mobile already registered'; err.classList.add('on'); return; }
  const salt=genSalt(), hash=await hashPass(pw,salt);
  DB.users.push({id:uid(),fullName:name,mobile:mob,email:email||'',password:hash,salt,role,status:'pending',createdAt:new Date().toLocaleString()});
  saveToLocal(); addLog('REGISTER',`${name} as ${role}`);
  showToast('Registered! Awaiting admin approval.');
  switchAuthTab('login');
}

async function changePassword(){
  const op=document.getElementById('pwd-old')?.value;
  const np=document.getElementById('pwd-new')?.value;
  const cf=document.getElementById('pwd-cf')?.value;
  const err=document.getElementById('pwd-err');
  if(!op||!np){ err.textContent='Fill all fields'; err.classList.add('on'); return; }
  if(np.length<6){ err.textContent='Minimum 6 characters'; err.classList.add('on'); return; }
  if(np!==cf){ err.textContent='Passwords do not match'; err.classList.add('on'); return; }
  const h=await hashPass(op,CU.salt);
  if(h!==CU.password){ err.textContent='Wrong current password'; err.classList.add('on'); return; }
  const salt=genSalt(), hash=await hashPass(np,salt);
  CU.password=hash; CU.salt=salt;
  const i=DB.users.findIndex(u=>u.id===CU.id); DB.users[i]=CU;
  saveToLocal(); addLog('CHANGE_PWD','Password changed'); showToast('Password updated');
  document.getElementById('pwd-old').value=''; document.getElementById('pwd-new').value=''; document.getElementById('pwd-cf').value='';
  err.classList.remove('on');
}

function shareFabricWA(id){
  const f=DB.fabrics.find(f=>f.id===id);
  if(!f) return;
  const stock=getStockFor(f.name);
  let msg=`${DB.company}\n\n${f.name}\n`;
  if(f.rate) msg+=`Rate: ${f.rate}\n`;
  if(stock?.length) msg+=`\nStock: ${stock.reduce((a,b)=>a+b.qty,0)} ${stock[0]?.unit||'Rolls'}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,'_blank');
  addLog('WA_SHARE',f.name);
}

function shareStockWA(name){
  const items=STOCK[name];
  if(!items) return;
  let msg=`${DB.company}\n\n${name}\n\nStock Available:\n`;
  items.forEach(i=>msg+=`${i.design} - ${i.qty} ${i.unit}\n`);
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,'_blank');
  addLog('WA_SHARE_STOCK',name);
}
