<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FabricFlow Pro | Complete Fabric Management ERP</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#08090d;--surface:#0f1118;--s2:#161b26;--s3:#1e2535;
  --border:#252d3d;--border2:#2e3a52;
  --gold:#e8a020;--gold2:#f5c040;--gold-dim:rgba(232,160,32,.12);
  --green:#27c98a;--red:#f04d4d;--blue:#4b8cf7;--sky:#22c4e8;--purple:#9b6dff;
  --text:#eef2f8;--t2:#8896ae;--t3:#4f5e73;
  --shadow:0 8px 40px rgba(0,0,0,.5);
  --r:16px;--rs:10px;
}
[data-theme=light]{
  --bg:#f0f2f7;--surface:#fff;--s2:#f5f7fb;--s3:#eaeef5;
  --border:#dde3ee;--border2:#c8d1e0;
  --gold:#c47a00;--gold2:#d98f10;--gold-dim:rgba(196,122,0,.1);
  --green:#12a368;--red:#d63030;--blue:#2563eb;--sky:#0898b8;--purple:#7c3aed;
  --text:#0c1220;--t2:#3d4e63;--t3:#8696ae;
  --shadow:0 8px 40px rgba(0,0,0,.1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

.auth-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg);position:relative}
.auth-bg::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(232,160,32,.07) 0%,transparent 70%)}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:28px;padding:44px 40px;width:100%;max-width:420px;box-shadow:var(--shadow);position:relative;z-index:1}
.auth-brand{font-family:'Fraunces',serif;font-size:2rem;color:var(--gold);text-align:center}
.auth-tagline{text-align:center;color:var(--t3);font-size:.75rem;margin-bottom:28px}
.tab-strip{display:flex;gap:4px;background:var(--bg);border-radius:40px;padding:4px;margin-bottom:24px}
.tab-btn{flex:1;padding:8px;border:none;background:transparent;color:var(--t2);font-weight:600;border-radius:30px;cursor:pointer}
.tab-btn.on{background:var(--gold);color:#000;box-shadow:0 2px 10px rgba(232,160,32,.3)}
.fld{margin-bottom:13px}
.fld label{display:block;font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:5px}
.fld input,.fld select{width:100%;padding:10px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Sora',sans-serif;font-size:.86rem;outline:none}
.fld input:focus,.fld select:focus{border-color:var(--gold)}
.auth-btn{width:100%;padding:11px;background:var(--gold);border:none;border-radius:30px;font-weight:700;color:#000;cursor:pointer;margin-top:8px}
.err-msg{font-size:.73rem;color:var(--red);margin-top:6px;display:none;padding:7px 12px;background:rgba(240,77,77,.09);border-radius:8px}
.err-msg.on{display:block}

.sidebar{width:256px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:200;overflow-y:auto;transition:transform .25s}
.sb-head{padding:22px 20px 18px;border-bottom:1px solid var(--border)}
.sb-brand{font-family:'Fraunces',serif;font-size:1.28rem;color:var(--gold)}
.sb-co{font-size:.67rem;display:block;color:var(--t3);margin-top:3px}
.sb-nav{padding:10px 8px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;color:var(--t2);font-weight:500;cursor:pointer;margin-bottom:2px;position:relative}
.nav-item:hover{background:var(--s2);color:var(--text)}
.nav-item.on{background:var(--gold-dim);color:var(--gold)}
.nav-item.on::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;background:var(--gold);border-radius:0 3px 3px 0}
.nav-icon{font-size:1rem;width:20px;text-align:center}
.nav-badge{background:var(--red);color:#fff;font-size:.62rem;border-radius:20px;padding:1px 6px;margin-left:auto}
.sb-foot{padding:16px;border-top:1px solid var(--border)}
.theme-pill{background:var(--s2);border:1px solid var(--border);width:100%;padding:7px;border-radius:30px;margin-bottom:12px;cursor:pointer;font-weight:600;color:var(--t2);text-align:center}
.theme-pill:hover{border-color:var(--gold);color:var(--gold)}
.user-row{display:flex;align-items:center;gap:9px}
.uavatar{width:34px;height:34px;background:linear-gradient(135deg,var(--gold),#c47a00);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#000}
.uname{font-size:.78rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.urole{font-size:.63rem;color:var(--t3)}
.exit-btn{background:transparent;border:1px solid var(--border);color:var(--t3);padding:5px 9px;border-radius:8px;cursor:pointer;margin-left:auto}
.exit-btn:hover{border-color:var(--red);color:var(--red)}
.main{margin-left:256px;flex:1;padding:28px 32px}

.page-head{margin-bottom:24px}
.page-title{font-family:'Fraunces',serif;font-size:1.85rem;color:var(--text);letter-spacing:-.3px}
.page-sub{color:var(--t3);font-size:.78rem;margin-top:3px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:14px;margin-bottom:24px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:18px}
.kpi-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--t3);margin-bottom:6px}
.kpi-val{font-size:2rem;font-weight:800;font-family:'Fraunces',serif}
.gold{color:var(--gold)}.grn{color:var(--green)}.blu{color:var(--blue)}.sky{color:var(--sky)}.rd{color:var(--red)}.prp{color:var(--purple)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:22px;margin-bottom:18px}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.card-title{font-size:.9rem;font-weight:700;color:var(--text)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:24px;font-weight:600;font-size:.74rem;border:none;cursor:pointer;transition:.15s;white-space:nowrap}
.btn:hover{transform:translateY(-1px)}
.btn-gold{background:var(--gold);color:#000}
.btn-gold:hover{background:var(--gold2);box-shadow:0 4px 14px rgba(232,160,32,.3)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--t2)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-green{background:rgba(39,201,138,.1);color:var(--green);border:1px solid rgba(39,201,138,.22)}
.btn-red{background:rgba(240,77,77,.1);color:var(--red);border:1px solid rgba(240,77,77,.22)}
.btn-blue{background:rgba(75,140,247,.1);color:var(--blue);border:1px solid rgba(75,140,247,.22)}
.btn-sky{background:rgba(34,196,232,.1);color:var(--sky);border:1px solid rgba(34,196,232,.22)}
.btn-sm{padding:4px 10px;font-size:.7rem}
.btn-row{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.search-wrap{position:relative;margin-bottom:16px;display:flex;gap:10px;align-items:center}
.search-wrap input{width:100%;padding:10px 14px 10px 38px;background:var(--bg);border:1.5px solid var(--border);border-radius:30px;color:var(--text);outline:none}
.search-wrap input:focus{border-color:var(--gold)}
.search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:.82rem;pointer-events:none}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px 10px;font-size:.7rem;text-transform:uppercase;color:var(--t3);border-bottom:2px solid var(--border);white-space:nowrap;font-weight:700}
td{padding:12px 10px;border-bottom:1px solid var(--border);color:var(--t2);vertical-align:middle;font-size:.82rem}
tr:hover td{background:var(--s2)}
.empty-row td{text-align:center;padding:36px;color:var(--t3);font-style:italic}

.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.67rem;font-weight:700}
.b-admin{background:rgba(240,77,77,.1);color:var(--red)}
.b-subadmin{background:rgba(155,109,255,.1);color:var(--purple)}
.b-broker{background:rgba(75,140,247,.1);color:var(--blue)}
.b-customer{background:rgba(34,196,232,.1);color:var(--sky)}
.b-pending{background:rgba(232,160,32,.1);color:var(--gold)}
.b-approved{background:rgba(39,201,138,.1);color:var(--green)}
.b-inactive{background:rgba(79,94,115,.1);color:var(--t3)}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:24px;width:100%;max-width:660px;max-height:90vh;overflow-y:auto;padding:28px;animation:rise .22s ease}
.modal-title{font-family:'Fraunces',serif;font-size:1.3rem;margin-bottom:18px;color:var(--text)}
.modal-title.danger{color:var(--red)}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-fld{margin-bottom:11px}
.modal-fld label{display:block;font-size:.64rem;font-weight:700;text-transform:uppercase;color:var(--t3);margin-bottom:4px}
.modal-fld input{width:100%;padding:9px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;color:var(--text);outline:none}
.modal-fld input:focus{border-color:var(--gold)}
.modal-foot{display:flex;gap:9px;margin-top:20px;flex-wrap:wrap}
.modal-foot .btn{flex:1;justify-content:center;padding:10px}
.fab-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:14px}
.fab-detail-grid label{font-size:.63rem;font-weight:700;text-transform:uppercase;color:var(--t3);display:block;margin-bottom:3px}
.fab-detail-grid .val{font-size:.88rem;color:var(--text);font-weight:500}

.stk-panel{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:13px;margin-top:12px}
.stk-title{font-size:.65rem;font-weight:700;text-transform:uppercase;color:var(--t3);margin-bottom:9px;display:flex;justify-content:space-between}
.stk-tbl{width:100%;border-collapse:collapse;font-size:.79rem}
.stk-tbl th{padding:6px 7px;font-size:.62rem;font-weight:700;color:var(--t3);border-bottom:1px solid var(--border)}
.stk-tbl td{padding:7px 7px;border-bottom:1px solid var(--border);color:var(--t2)}
.stk-total{display:flex;justify-content:space-between;padding:8px 7px 0;font-size:.8rem;font-weight:700;border-top:1px solid var(--border);margin-top:6px}

.img-gallery{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.img-thumb{width:80px;height:80px;object-fit:cover;border-radius:10px;border:2px solid var(--border);cursor:pointer}
.img-thumb:hover{border-color:var(--gold);transform:scale(1.05)}
.img-url-row{display:flex;gap:6px;align-items:center;margin-bottom:7px}
.img-url-row input{flex:1;padding:8px 11px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--text);outline:none}

.drop-zone{border:2px dashed var(--border2);border-radius:16px;padding:32px 20px;text-align:center;cursor:pointer;background:var(--s2)}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--gold);background:var(--gold-dim)}
.drop-icon{font-size:2.5rem;margin-bottom:8px}

.info-box{background:rgba(232,160,32,.06);border:1px solid rgba(232,160,32,.18);border-radius:10px;padding:11px 14px;font-size:.76rem;color:var(--t2);margin-bottom:14px}
.info-box code{background:var(--bg);padding:1px 5px;border-radius:4px;color:var(--gold)}

#toast-root{position:fixed;bottom:20px;left:0;right:0;z-index:9999;display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none}
.toast{padding:9px 20px;border-radius:30px;font-size:.8rem;font-weight:600;box-shadow:var(--shadow);animation:rise .2s ease;white-space:nowrap;border:1px solid var(--border);background:var(--surface);color:var(--text)}
.toast-ok{background:rgba(39,201,138,.12);border-color:rgba(39,201,138,.3);color:var(--green)}
.toast-err{background:rgba(240,77,77,.12);border-color:rgba(240,77,77,.3);color:var(--red)}

.log-row{display:grid;grid-template-columns:148px 120px 125px 1fr;gap:9px;padding:8px 9px;border-bottom:1px solid var(--border);font-size:.77rem}
.log-row:hover{background:var(--s2)}
.log-head{font-size:.62rem;font-weight:700;text-transform:uppercase;color:var(--t3);padding:6px 9px;border-bottom:2px solid var(--border);display:grid;grid-template-columns:148px 120px 125px 1fr;gap:9px}
.log-tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:.65rem;font-weight:700;background:rgba(75,140,247,.1);color:var(--blue)}

.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.set-inp{width:100%;padding:10px 13px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);outline:none;margin-bottom:10px}
.set-inp:focus{border-color:var(--gold)}
.stock-input{width:80px;padding:5px 8px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--text);text-align:center}

.gs-step{display:flex;gap:14px;padding:14px;background:var(--s2);border-radius:12px;margin-bottom:10px;border:1px solid var(--border)}
.gs-num{width:28px;height:28px;background:var(--gold);color:#000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.8rem}
.gs-text{font-size:.8rem;color:var(--t2);line-height:1.65}
.gs-text strong{color:var(--text)}
.gs-text code{background:var(--bg);padding:1px 5px;border-radius:4px;color:var(--gold)}

.hamburger{display:none;position:fixed;top:13px;left:13px;z-index:300;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:7px 10px;cursor:pointer}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:199}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:820px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 30px rgba(0,0,0,.4)}
  .sb-overlay.open{display:block}
  .main{margin-left:0;padding:60px 14px 18px}
  .hamburger{display:flex}
  .kpi-row{grid-template-columns:1fr 1fr}
  .fab-detail-grid,.modal-grid,.settings-grid{grid-template-columns:1fr}
  .log-row,.log-head{grid-template-columns:110px 90px 1fr}
  .log-row>*:last-child,.log-head>*:last-child{display:none}
}
</style>
</head>
<body>
<div id="root"></div>
<div id="toast-root"></div>

<script>
'use strict';

const esc = s => { if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); };
const san = (s, n=200) => s ? String(s).trim().slice(0,n) : '';
const uid = () => crypto.randomUUID ? crypto.randomUUID() : (Date.now().toString(36)+Math.random().toString(36).substr(2));
const genSalt = () => { const a=new Uint8Array(16); crypto.getRandomValues(a); return Array.from(a,b=>b.toString(16).padStart(2,'0')).join(''); };
const hashPass = async (p,s) => { const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(p+s)); return Array.from(new Uint8Array(b),x=>x.toString(16).padStart(2,'0')).join(''); };
const validMob = m => /^[6-9][0-9]{9}$/.test(m);
const validEmail = e => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
function showToast(msg,type='ok'){
  const el=document.createElement('div'); el.className=`toast toast-${type}`; el.textContent=msg;
  document.getElementById('toast-root').appendChild(el);
  setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),300);},2600);
}
const RL={}; const checkRL=id=>{const n=Date.now();if(!RL[id])RL[id]={c:0,r:n+60000};if(n>RL[id].r)RL[id]={c:0,r:n+60000};return++RL[id].c<=5;};

const ROLE_LABELS = {admin:'Admin',subadmin:'Sub Admin',broker:'Broker/Agent',customer:'Customer'};
const isAdmin = () => CU?.role === 'admin';
const isSubAdmin = () => CU?.role === 'subadmin';
const isAdminLike = () => ['admin','subadmin'].includes(CU?.role);
const canEdit = () => CU?.role === 'admin';
const isAdminOrSubAdmin = () => ['admin','subadmin'].includes(CU?.role);

const SK = {U:'ff_u',F:'ff_f',L:'ff_l',CO:'ff_co',TH:'ff_th',ST:'ff_st',IM:'ff_im',AB:'ff_ab',GS:'ff_gs',GH:'ff_gh_url',GS2:'ff_gh_sha'};
let GIST_TOKEN = ''; let GIST_ID = ''; let GIST_ETAG = ''; let DB_DIRTY = false; let _gistSyncTimer = null;
const GIST_FILE = 'fabricflow_db.json';
const GIST_SYNC_MS = 30000;
let DB={users:[],fabrics:[],logs:[],company:'FabricFlow'};
let CU=null, PAGE='dashboard', STOCK={}, IMGS={}, isDark=true, GS_URL='', GH_URL='', GH_SHA='';

async function initDB(){
  isDark = localStorage.getItem(SK.TH) !== 'light';
  applyTheme(false);
  GH_URL  = localStorage.getItem(SK.GH)  || '';
  GH_SHA  = localStorage.getItem(SK.GS2) || '';
  GS_URL  = localStorage.getItem(SK.GS)  || '';
  GIST_TOKEN = localStorage.getItem('ff_gist_tok') || '';
  GIST_ID    = localStorage.getItem('ff_gist_id')  || '';

  if(GIST_TOKEN && GIST_ID){
    try{
      const data = await gistFetch();
      if(data){ applyGistData(data); return; }
    }catch(e){ console.warn('Gist load failed, using cache:',e.message); }
  }
  loadFromLocalCache();
}

function loadFromLocalCache(){
  const su=localStorage.getItem(SK.U);
  if(su){ try{ DB.users=JSON.parse(su); }catch(e){} }
  if(!DB.users.length) createDefaultAdmin();
  DB.fabrics = tryParse(localStorage.getItem(SK.F), []);
  DB.logs    = tryParse(localStorage.getItem(SK.L), []);
  DB.company = localStorage.getItem(SK.CO) || 'FabricFlow';
  STOCK = tryParse(localStorage.getItem(SK.ST), {});
  IMGS  = tryParse(localStorage.getItem(SK.IM), {});
  const ab64=localStorage.getItem(SK.AB);
  if(ab64 && Object.keys(STOCK).length===0) restoreStockAuto(ab64).catch(()=>{});
}

function tryParse(s, def){ try{ return s?JSON.parse(s):def; }catch(e){ return def; } }

async function createDefaultAdmin(){
  const salt=genSalt(), hash=await hashPass('admin123',salt);
  DB.users=[{id:uid(),fullName:'Master Admin',mobile:'9999999999',email:'admin@fabricflow.com',password:hash,salt,role:'admin',status:'approved',createdAt:new Date().toLocaleString()}];
  cacheLocally();
}

function applyGistData(data){
  if(data.users   && Array.isArray(data.users))   DB.users   = data.users;
  if(data.fabrics && Array.isArray(data.fabrics)) DB.fabrics = data.fabrics;
  if(data.logs    && Array.isArray(data.logs))    DB.logs    = data.logs.slice(0,500);
  if(data.company) DB.company = data.company;
  if(data.stock  && typeof data.stock==='object') STOCK = data.stock;
  if(data.imgs   && typeof data.imgs==='object')  IMGS  = data.imgs;
  if(data.gh_url) GH_URL = data.gh_url;
  if(!DB.users.length) createDefaultAdmin();
  cacheLocally();
}

function cacheLocally(){
  localStorage.setItem(SK.U, JSON.stringify(DB.users));
  localStorage.setItem(SK.F, JSON.stringify(DB.fabrics));
  localStorage.setItem(SK.L, JSON.stringify(DB.logs));
  localStorage.setItem(SK.CO, DB.company);
  localStorage.setItem(SK.ST, JSON.stringify(STOCK));
  localStorage.setItem(SK.IM, JSON.stringify(IMGS));
}

async function gistFetch(){
  const r = await fetch('https://api.github.com/gists/'+GIST_ID, {
    headers:{'Authorization':'token '+GIST_TOKEN,'Accept':'application/vnd.github.v3+json','Cache-Control':'no-cache'}
  });
  if(r.status===404) throw new Error('Gist not found');
  if(r.status===401) throw new Error('GitHub token invalid or expired');
  if(!r.ok) throw new Error('GitHub API: HTTP '+r.status);
  GIST_ETAG = r.headers.get('etag')||'';
  const gist = await r.json();
  const file = gist.files && gist.files[GIST_FILE];
  if(!file) return null;
  try{ return JSON.parse(file.content); }catch(e){ return null; }
}

async function gistSave(){
  if(!GIST_TOKEN) return false;
  const payload = {
    users: DB.users, fabrics: DB.fabrics, logs: DB.logs.slice(0,200),
    company: DB.company, stock: STOCK, imgs: IMGS, gh_url: GH_URL,
    saved_at: new Date().toISOString(),
  };
  const body = {files:{}};
  body.files[GIST_FILE] = {content: JSON.stringify(payload, null, 2)};

  if(!GIST_ID){
    body.description = 'FabricFlow Pro Shared Database';
    body.public = false;
    const r = await fetch('https://api.github.com/gists',{
      method:'POST',
      headers:{'Authorization':'token '+GIST_TOKEN,'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    if(!r.ok){ const e=await r.json(); throw new Error(e.message||'HTTP '+r.status); }
    const g = await r.json();
    GIST_ID = g.id;
    localStorage.setItem('ff_gist_id', GIST_ID);
    addLog('GIST_CREATED','Shared DB Gist created: '+GIST_ID);
    return true;
  }

  const r = await fetch('https://api.github.com/gists/'+GIST_ID,{
    method:'PATCH',
    headers:{'Authorization':'token '+GIST_TOKEN,'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  if(r.status===404){ GIST_ID=''; localStorage.removeItem('ff_gist_id'); throw new Error('Gist not found — was it deleted?'); }
  if(!r.ok){ const e=await r.json().catch(()=>{}); throw new Error(e?.message||'HTTP '+r.status); }
  cacheLocally();
  return true;
}

// ========== STOCK PARSING - SUPPORTS YOUR JSON FORMAT ==========
function parseStockJSON(json){
  if(!Array.isArray(json)) throw new Error('Expected JSON array, got '+typeof json);
  const stock={};
  json.forEach(row=>{
    // Support multiple field name formats
    let name = row.fabric || row.Fabric || row.FABRIC || 
               row["Item Name"] || row["ITEM NAME"] || row["item name"] ||
               row["ItemName"] || row["itemName"];
    
    let design = row.design || row.Design || row.DESIGN || 
                 row["Design / Color No"] || row["DESIGN / COLOR NO"] ||
                 row["Design"] || row["Color No"] || row["Shade"];
    
    let qty = row.qty || row.Qty || row.QTY || 
              row.Quantity || row.QUANTITY || row["Quantity"];
    
    let unit = row.unit || row.Unit || row.UNIT || 
               row["Unit"] || "Rolls";
    
    let comment = row.comment || row.Comment || row.COMMENT || 
                  row["Comment"] || "";
    
    if(!name) return;
    
    name = name.toString().trim().toUpperCase();
    design = design ? design.toString().trim() : "MAIN";
    qty = parseFloat(qty) || 0;
    
    if(!stock[name]) stock[name]=[];
    stock[name].push({design, qty, unit, comment});
  });
  return stock;
}

async function parseStockFile(file){
  const n=file.name.toLowerCase();
  if(n.endsWith('.csv')) return parseStockCSV(file);
  if(n.endsWith('.xlsx')||n.endsWith('.xls')) return parseStockXLSX(file);
  throw new Error('Unsupported file. Use .xlsx .xls or .csv');
}

async function parseStockXLSX(file){
  return new Promise((res,rej)=>{
    const r=new FileReader(); r.onerror=rej;
    r.onload=e=>{ 
      try{ 
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'}); 
        const json=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
        res(parseStockJSON(json));
      }catch(e){rej(e);} 
    };
    r.readAsArrayBuffer(file);
  });
}

async function parseStockCSV(file){
  return new Promise((res,rej)=>{
    const r=new FileReader(); r.onerror=rej;
    r.onload=e=>{
      try{
        const lines=e.target.result.replace(/\r/g,'').split('\n');
        const headers=lines[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim());
        const json=[];
        for(let i=1;i<lines.length;i++){
          if(!lines[i].trim()) continue;
          const values=lines[i].split(',').map(v=>v.replace(/^"|"$/g,'').trim());
          const row={};
          headers.forEach((h,idx)=>{ row[h]=values[idx]||''; });
          json.push(row);
        }
        res(parseStockJSON(json));
      }catch(e){rej(e);}
    };
    r.readAsText(file,'UTF-8');
  });
}

async function uploadStockFile(file,silent=false){
  try{
    const stock=await parseStockFile(file); 
    STOCK=stock;
    localStorage.setItem(SK.ST,JSON.stringify(STOCK));
    const r2=new FileReader(); r2.onload=ev=>localStorage.setItem(SK.AB,ev.target.result); r2.readAsDataURL(file);
    if(!silent) showToast(`Stock loaded: ${Object.keys(stock).length} fabric types`);
    addLog('STOCK_UPLOAD',`File: ${file.name} — ${Object.keys(stock).length} fabric types loaded`);
    renderPage();
    return true;
  }catch(e){
    if(!silent) showToast('Error: '+e.message,'err');
    addLog('STOCK_UPLOAD_ERR', `File: ${file.name} — Error: ${e.message}`);
    return false;
  }
}

function getStockFor(name){
  if(!name) return null;

  if(STOCK[u]) return STOCK[u];

  return k?STOCK[k]:null;
}

async function fetchGitHubStock(isManual){
  if(!GH_URL) return false;
  try{
    const url = GH_URL.includes('?') ? GH_URL+'&_t='+Date.now() : GH_URL+'?_t='+Date.now();
    const r = await fetch(url, {cache:'no-cache'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const text = await r.text();
    if(!text||text.trim().length<5) throw new Error('Empty response');

    let json;
    try{ json=JSON.parse(text); }
    catch(pe){ throw new Error('Invalid JSON: '+pe.message); }

    const newStock = parseStockJSON(json);
    if(!Object.keys(newStock).length) throw new Error('No fabric data found');

    let hash=0;
    for(let i=0;i<Math.min(text.length,2000);i++) hash=((hash<<5)-hash)+text.charCodeAt(i)|0;
    const sha=String(hash);

    if(!isManual && sha===GH_SHA){
      showSyncBadge('nochange','No changes · '+new Date().toLocaleTimeString());
      return false;
    }

    GH_SHA=sha; localStorage.setItem(SK.GS2, GH_SHA);
    STOCK=newStock; localStorage.setItem(SK.ST,JSON.stringify(STOCK));
    const now=new Date().toLocaleString();
    localStorage.setItem('ff_last_sync',now);

    if(isManual || sha!==GH_SHA){
      addLog('GH_SYNC_OK','GitHub stock updated — '+Object.keys(STOCK).length+' fabric types');
      renderPage();
    }
    return true;
  }catch(e){
    addLog('GH_SYNC_ERR','GitHub fetch error: '+e.message);
    throw e;
  }
}

async function saveAndFetchGitHub(){
  const url = (document.getElementById('gh-url-inp')?.value||'').trim();
  if(!url){ showToast('Paste your GitHub raw JSON URL','err'); return; }
  if(!url.startsWith('http')){ showToast('Enter a valid URL starting with https://','err'); return; }
  
  const btn = document.getElementById('gh-fetch-btn');
  if(btn){ btn.disabled=true; btn.textContent='Fetching…'; }
  const setStatus=(msg,type)=>{
    const el=document.getElementById('gh-status');
    if(el){ el.textContent=msg; el.style.color=type==='err'?'var(--red)':type==='ok'?'var(--green)':'var(--t2)'; }
  };
  try{
    setStatus('Connecting to GitHub…');
    const fetchUrl = url.includes('?') ? url+'&_t='+Date.now() : url+'?_t='+Date.now();
    const r = await fetch(fetchUrl, {cache:'no-cache'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const text = await r.text();
    if(!text||text.trim().length<5) throw new Error('Empty response');

    let json;
    try{ json=JSON.parse(text); }
    catch(pe){ throw new Error('Invalid JSON: '+pe.message); }

    const newStock = parseStockJSON(json);
    if(!Object.keys(newStock).length) throw new Error('No fabric data found');

    let hash=0;
    for(let i=0;i<Math.min(text.length,2000);i++) hash=((hash<<5)-hash)+text.charCodeAt(i)|0;
    GH_SHA = String(hash);

    GH_URL=url;
    localStorage.setItem(SK.GH, GH_URL);
    localStorage.setItem(SK.GS2, GH_SHA);
    if(GIST_TOKEN) saveDB();
    STOCK=newStock;
    localStorage.setItem(SK.ST,JSON.stringify(STOCK));
    const now=new Date().toLocaleString();
    localStorage.setItem('ff_last_sync',now);

    setStatus('✓ Connected — '+Object.keys(STOCK).length+' fabric types loaded · '+now,'ok');
    addLog('GH_CONNECT','GitHub URL saved — '+Object.keys(STOCK).length+' fabric types');
    showToast('✓ Stock loaded: '+Object.keys(STOCK).length+' fabric types');
    startAutoSync();
    renderPage();
  }catch(e){
    setStatus('Failed: '+e.message,'err');
    addLog('GH_ERR','Connect failed: '+e.message);
    showToast('Error: '+e.message,'err');
  } finally {
    if(btn){ btn.disabled=false; btn.textContent='🐙 Connect & Fetch'; }
  }
}

function clearGitHubUrl(){
  GH_URL=''; GH_SHA='';
  localStorage.removeItem(SK.GH); localStorage.removeItem(SK.GS2);
  stopAutoSync();
  addLog('GH_DISCONNECT','GitHub URL disconnected');
  showToast('GitHub URL disconnected');
  renderPage();
}

async function autoSyncStock(isManual=false){
  if(!GH_URL) return;
  showSyncBadge('syncing');

    await fetchGitHubStock(isManual);
    showSyncBadge('ok','Stock sync completed');
    if(isManual) showToast('Stock sync completed');
  }catch(e){
    showSyncBadge('err','Sync failed — check Logs');
    if(isManual) showToast('Sync failed: '+e.message,'err');
  }
}

function startAutoSync(){

  _autoSyncTimer = setInterval(()=>autoSyncStock(false), AUTO_SYNC_INTERVAL);
}

}

  const navNames = {dashboard:'Dashboard',catalog:'Fabrics',stock:'Stock',users:'Users',github:'GitHub Stock',settings:'Settings'};
  const navIcons = {dashboard:'⊞',catalog:'◈',stock:'▦',users:'◉',github:'🐙',settings:'◎'};
  
  let sidebar = `<div class="sidebar" id="sidebar"><div class="sb-head"><div class="sb-brand">FabricFlow Pro</div><span class="sb-co">${esc(DB.company)}</span></div><div class="sb-nav">`;
  nav.forEach(p=>{
    sidebar += `<div class="nav-item ${PAGE===p?'on':''}" onclick="goTo('${p}')"><span class="nav-icon">${navIcons[p]}</span>${navNames[p]}${p==='users'&&pending?`<span class="nav-badge">${pending}</span>`:''}</div>`;
  });
  sidebar += `</div><div class="sb-foot"><button class="theme-pill" onclick="toggleTheme()">${isDark?'☀ Light Mode':'◑ Dark Mode'}</button>
    <div class="user-row"><div class="uavatar">${(CU?.fullName?.charAt(0)||'U').toUpperCase()}</div>
    <div><div class="uname">${esc(CU?.fullName)}</div><div class="urole">${esc(ROLE_LABELS[CU?.role]||CU?.role)}</div></div>
    <button class="exit-btn" onclick="logout()">Exit</button></div></div></div>
    <div class="sb-overlay" id="sb-overlay" onclick="closeSidebar()"></div>
    <button class="hamburger" onclick="toggleSidebar()">☰</button>`;
    
  let mainHtml = '';
  if(PAGE==='dashboard') mainHtml = `<div class="page-head"><div class="page-title">Dashboard</div><div class="page-sub">Welcome back, ${esc(CU.fullName)}</div></div>
    <div class="kpi-row"><div class="kpi"><div class="kpi-label">Fabrics</div><div class="kpi-val gold">${DB.fabrics.length}</div></div>
    <div class="kpi"><div class="kpi-label">Stock Types</div><div class="kpi-val grn">${Object.keys(STOCK).length}</div></div>
    <div class="kpi"><div class="kpi-label">Total Stock</div><div class="kpi-val blu">${Object.values(STOCK).reduce((a,b)=>a+b.reduce((x,y)=>x+(typeof y.qty==='number'?y.qty:0),0),0).toLocaleString('en-IN')}</div></div>
    <div class="kpi"><div class="kpi-label">Images</div><div class="kpi-val sky">${Object.values(IMGS).reduce((a,b)=>a+b.length,0)}</div></div>
    <div class="kpi"><div class="kpi-label">Pending</div><div class="kpi-val ${pending>0?'rd':'grn'}">${pending}</div></div>
    <div class="kpi"><div class="kpi-label">Users</div><div class="kpi-val prp">${DB.users.filter(u=>u.status==='approved'&&u.role!=='admin').length}</div></div></div>
    <div class="card"><div class="card-head"><span class="card-title">GitHub Stock URL</span></div>
    <div class="info-box">Current stock URL: <code>${GH_URL || 'https://gist.githubusercontent.com/viphologram/12f3b69117bcdfdfd90214dec81293c4/raw/stock.json'}</code></div>
    <div><strong>${Object.keys(STOCK).length}</strong> fabric types loaded · <strong>${Object.values(STOCK).reduce((a,b)=>a+b.length,0)}</strong> shade variants</div>
    <button class="btn btn-sky btn-sm" style="margin-top:10px" onclick="goTo('github')">Go to GitHub Stock Page</button></div>`;
  else if(PAGE==='github') mainHtml = pageGitHubStock();
  else mainHtml = `<div class="page-head"><div class="page-title">${navNames[PAGE]}</div></div><div class="card"><p>Feature coming soon. Visit GitHub Stock page to load your data.</p><button class="btn btn-gold" onclick="goTo('github')">Go to GitHub Stock</button></div>`;
  
  root.innerHTML = sidebar + `<div class="main" id="main-content">${mainHtml}</div>`;
}

function goTo(p){ PAGE=p; closeSidebar(); renderApp(); }
function toggleSidebar(){ document.getElementById('sidebar')?.classList.toggle('open'); document.getElementById('sb-overlay')?.classList.toggle('open'); }
function closeSidebar(){ document.getElementById('sidebar')?.classList.remove('open'); document.getElementById('sb-overlay')?.classList.remove('open'); }

// Expose functions
window.goTo = goTo;
window.toggleSidebar = toggleSidebar;
window.toggleTheme = toggleTheme;
window.logout = logout;
window.switchAuthTab = switchAuthTab;
window.doLogin = doLogin;
window.doRegister = doRegister;
window.saveAndFetchGitHub = saveAndFetchGitHub;
window.clearGitHubUrl = clearGitHubUrl;
window.autoSyncStock = autoSyncStock;
window.downloadSampleStockJSON = downloadSampleStockJSON;

initDB().then(() => renderApp());
</script>
</body>
</html>
