<script>
// ============================================================
// FABRICFLOW PRO - FIXED: USER REGISTRATION PENDING APPROVAL & THEME PERSISTENCE
// ============================================================

const esc = s => { if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
const san = (s, n=200) => s ? String(s).trim().slice(0,n) : '';
const uid = () => crypto.randomUUID ? crypto.randomUUID() : (Date.now().toString(36)+Math.random().toString(36).substr(2));
const genSalt = () => { const a=new Uint8Array(16); crypto.getRandomValues(a); return Array.from(a,b=>b.toString(16).padStart(2,'0')).join(''); };
const hashPass = async (p,s) => { const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(p+s)); return Array.from(new Uint8Array(b),x=>x.toString(16).padStart(2,'0')).join(''); };
const validMob = m => /^[6-9][0-9]{9}$/.test(m);
const validEmail = e => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);

function showToast(msg,type='ok'){
  const el=document.createElement('div'); el.className=`toast toast-${type}`; el.textContent=msg;
  document.getElementById('toast-root').appendChild(el);
  setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),300);},2600);
}

const ROLE_LABELS = {admin:'Admin',subadmin:'Sub Admin',broker:'Broker/Agent',customer:'Customer'};
const isAdmin = () => CU?.role === 'admin';
const isSubAdmin = () => CU?.role === 'subadmin';
const isAdminLike = () => ['admin','subadmin'].includes(CU?.role);
const canEdit = () => CU?.role === 'admin';
const isAdminOrSubAdmin = () => ['admin','subadmin'].includes(CU?.role);

let DB={users:[],fabrics:[],logs:[],company:'FabricFlow'};
let CU=null, PAGE='dashboard', STOCK={}, IMGS={}, isDark=true;
let MASTER_TOKEN = '';
let GIST_ID = '';

// Persistent Theme: load from localStorage and apply
function applyTheme(){
  const savedTheme = localStorage.getItem('ff_theme');
  isDark = savedTheme !== null ? savedTheme === 'dark' : true;
  if(isDark) document.documentElement.setAttribute('data-theme','dark');
  else document.documentElement.removeAttribute('data-theme');
}
function toggleTheme(){ 
  isDark = !isDark; 
  localStorage.setItem('ff_theme', isDark ? 'dark' : 'light'); 
  applyTheme(); 
  renderApp(); 
}
applyTheme();

// Gist / Npoint stub - fallback localStorage only (simple fully functional offline-first)
const NPIO_URL = 'https://api.npoint.io/ea7b9700322ea640a188';
async function loadCredentialsFromNpoint(){
  try{
    const res = await fetch(NPIO_URL, {cache:'no-cache'});
    if(res.ok){
      const data = await res.json();
      if(data.gistId && data.token){
        GIST_ID = data.gistId;
        MASTER_TOKEN = data.token;
        return true;
      }
    }
  } catch(e){}
  return false;
}

function loadFromLocalStorage(){
  try{
    const u=localStorage.getItem('ff_users'); if(u) DB.users=JSON.parse(u);
    const f=localStorage.getItem('ff_fabrics'); if(f) DB.fabrics=JSON.parse(f);
    const l=localStorage.getItem('ff_logs'); if(l) DB.logs=JSON.parse(l);
    const c=localStorage.getItem('ff_company'); if(c) DB.company=c;
    const s=localStorage.getItem('ff_stock'); if(s) STOCK=JSON.parse(s);
    const i=localStorage.getItem('ff_imgs'); if(i) IMGS=JSON.parse(i);
    return true;
  } catch(e){ return false; }
}

function scheduleSave(){
  localStorage.setItem('ff_users', JSON.stringify(DB.users));
  localStorage.setItem('ff_fabrics', JSON.stringify(DB.fabrics));
  localStorage.setItem('ff_logs', JSON.stringify(DB.logs.slice(0,500)));
  localStorage.setItem('ff_company', DB.company);
  localStorage.setItem('ff_stock', JSON.stringify(STOCK));
  localStorage.setItem('ff_imgs', JSON.stringify(IMGS));
}

function addLog(action,details){
  DB.logs.unshift({id:uid(),userId:CU?.id||'sys',userName:CU?.fullName||'System',action,details,time:new Date().toLocaleString()});
  if(DB.logs.length>500) DB.logs=DB.logs.slice(0,500);
  scheduleSave();
}

async function initDB(){
  // First load localStorage
  loadFromLocalStorage();
  
  // Ensure admin exists
  if(DB.users.length === 0){
    const salt=genSalt();
    const hash=await hashPass('admin123',salt);
    DB.users=[{id:uid(),fullName:'Master Admin',mobile:'9999999999',email:'admin@fabricflow.com',password:hash,salt,role:'admin',status:'approved',createdAt:new Date().toLocaleString()}];
    scheduleSave();
  }
  
  // Restore session
  const sess = sessionStorage.getItem('ffs');
  if(sess && !CU){
    try{
      const d=JSON.parse(sess);
      const f=DB.users.find(u=>u.id===d.id && u.status==='approved');
      if(f) CU=f;
    } catch(e){}
  }
  
  // Load credentials and try gist (silent background)
  loadCredentialsFromNpoint().catch(()=>{});
  
  const loader = document.getElementById('app-loader');
  if(loader) loader.remove();
  renderApp();
}

// ========== AUTH ==========
async function doLogin(){
  const id=document.getElementById('l-id').value.trim();
  const pw=document.getElementById('l-pw').value;
  const err=document.getElementById('l-err');
  err.classList.remove('on');
  if(!id||!pw){ err.textContent='All fields required'; err.classList.add('on'); return; }
  const user=DB.users.find(u=>u.mobile===id||u.email===id);
  if(!user){ err.textContent='User not found'; err.classList.add('on'); return; }
  if(user.status!=='approved'){ err.textContent=user.status==='pending'?'⏳ Pending admin approval. Please wait for admin to activate.':'Account deactivated'; err.classList.add('on'); return; }
  const hash=await hashPass(pw,user.salt);
  if(hash!==user.password){ err.textContent='Wrong password'; err.classList.add('on'); return; }
  CU=user;
  sessionStorage.setItem('ffs',JSON.stringify({id:user.id}));
  addLog('LOGIN',user.role);
  PAGE='dashboard';
  renderApp();
  showToast(`Welcome back, ${CU.fullName}`);
}

async function doRegister(){
  const name=san(document.getElementById('r-name').value,100);
  const mob=san(document.getElementById('r-mob').value,10);
  const email=san(document.getElementById('r-email').value,100);
  const pw=document.getElementById('r-pw').value;
  const role=document.getElementById('r-role').value;
  const err=document.getElementById('r-err');
  err.classList.remove('on');
  if(!name||!mob||!pw){ err.textContent='All fields required'; err.classList.add('on'); return; }
  if(!validMob(mob)){ err.textContent='Invalid mobile (10 digits, start 6-9)'; err.classList.add('on'); return; }
  if(email&&!validEmail(email)){ err.textContent='Invalid email format'; err.classList.add('on'); return; }
  if(pw.length<6){ err.textContent='Password min 6 characters'; err.classList.add('on'); return; }
  if(DB.users.find(u=>u.mobile===mob)){ err.textContent='Mobile already registered'; err.classList.add('on'); return; }
  const salt=genSalt(), hash=await hashPass(pw,salt);
  const newUser = {id:uid(),fullName:name,mobile:mob,email:email||'',password:hash,salt,role,status:'pending',createdAt:new Date().toLocaleString()};
  DB.users.push(newUser);
  scheduleSave();
  addLog('REGISTER',`${name} as ${role} (PENDING)`);
  showToast(`Registered successfully! Awaiting admin approval.`);
  switchAuthTab('login');
  renderApp();
}

function logout(){
  sessionStorage.removeItem('ffs');
  CU=null;
  renderApp();
}

function switchAuthTab(t){
  const lf=document.getElementById('lf'); const rf=document.getElementById('rf');
  if(lf) lf.style.display=t==='login'?'block':'none';
  if(rf) rf.style.display=t==='register'?'block':'none';
  document.querySelectorAll('.tab-btn').forEach(el=>el.classList.toggle('on',el.dataset.tab===t));
}

// ========== USER MANAGEMENT (ADMIN PANEL VISIBLE & FUNCTIONAL) ==========
function approveUser(id){ 
  const u=DB.users.find(u=>u.id===id); 
  if(u){u.status='approved';scheduleSave();addLog('APPROVE',u.fullName);showToast(`✅ ${u.fullName} approved, can now login.`);renderApp();} 
}
function rejectUser(id){ 
  const u=DB.users.find(u=>u.id===id); 
  DB.users=DB.users.filter(u=>u.id!==id); 
  scheduleSave(); addLog('REJECT',u?.fullName||id); showToast(`❌ ${u?.fullName} rejected and removed.`,'err'); renderApp(); 
}
function deactivateUser(id){ const u=DB.users.find(u=>u.id===id); if(u&&u.role!=='admin'){u.status='inactive';scheduleSave();addLog('DEACTIVATE',u.fullName);showToast(`${u.fullName} deactivated`);renderApp();} }
function activateUser(id){ const u=DB.users.find(u=>u.id===id); if(u){u.status='approved';scheduleSave();addLog('ACTIVATE',u.fullName);showToast(`${u.fullName} activated`);renderApp();} }

// ========== STOCK / FABRIC HELPERS ==========
function parseStockJSON(json){
  if(!Array.isArray(json)) throw new Error('Expected JSON array');
  const stock={};
  json.forEach(row=>{
    let name = row.fabric || row.Fabric || row["Item Name"] || row["ITEM NAME"];
    let design = row.design || row.Design || row["Design / Color No"];
    let qty = row.qty || row.Qty || row.Quantity || row["Quantity"];
    let unit = row.unit || row.Unit || "Rolls";
    let comment = row.comment || row.Comment || "";
    if(!name) return;
    name = name.toString().trim().toUpperCase();
    design = design ? design.toString().trim() : "MAIN";
    qty = parseFloat(qty) || 0;
    if(!stock[name]) stock[name]=[];
    stock[name].push({design, qty, unit, comment});
  });
  return stock;
}

function getStockFor(name){ if(!name) return null; const u=name.toUpperCase().trim(); return STOCK[u] || null; }
function updateStockQuantity(fabricName, newQty){
  if(!isAdminOrSubAdmin()) return;
  const qty=parseInt(newQty) || 0;
  const up=fabricName.toUpperCase().trim();
  if(STOCK[up]){ STOCK[up][0].qty = qty; }
  else { STOCK[up] = [{ design: 'MAIN', qty: qty, unit: 'Rolls', comment: '' }]; }
  scheduleSave();
  addLog('UPDATE_STOCK', `${fabricName} → ${qty} Rolls`);
  showToast(`${fabricName} stock updated to ${qty}`);
  renderApp();
}

function addFabric(d){
  if(!d.sn||!d.name){ showToast('SN & Name required','err'); return false; }
  if(DB.fabrics.some(f=>f.sn===d.sn || f.name.toLowerCase()===d.name.toLowerCase())){ showToast('Duplicate SN or Name','err'); return false; }
  DB.fabrics.push({id:uid(), sn:san(d.sn,20), name:san(d.name,80), cat:san(d.cat||'',50),
    gsm:san(d.gsm||'',30), width:san(d.width||'',30), comp:san(d.comp||'',100),
    hf:san(d.hf||'',20), rate:san(d.rate||'',30)});
  scheduleSave();
  addLog('ADD_FABRIC',`${d.sn} - ${d.name}`);
  showToast(`Added ${d.name}`);
  renderApp(); return true;
}

function deleteFabric(id){ const f=DB.fabrics.find(f=>f.id===id); if(f && confirm(`Delete "${f.name}"?`)){ DB.fabrics=DB.fabrics.filter(f=>f.id!==id); delete IMGS[id]; scheduleSave(); addLog('DELETE_FABRIC',f.name); showToast(`Deleted ${f.name}`,'err'); renderApp(); } }

function pageGitHubStock(){ return `<div class="page-head"><div class="page-title">GitHub Sync</div></div><div class="card"><div class="info-box">🔧 Demo: Use local storage stock. To enable auto-sync, configure raw JSON URL. For now stock manually managed.</div><button class="btn btn-sky" onclick="showToast('Stock demo mode active, add stock via CSV or manual')">Manual Stock Info</button></div>`; }

function openModal(html){ let ov=document.getElementById('modal-ov'); if(!ov){ ov=document.createElement('div'); ov.id='modal-ov'; ov.className='modal-bg'; ov.onclick=e=>{if(e.target===ov)closeModal();}; document.body.appendChild(ov); } ov.innerHTML=html; ov.style.display='flex'; }
function closeModal(){ const ov=document.getElementById('modal-ov'); if(ov) ov.style.display='none'; }

function renderApp(){
  const root=document.getElementById('root');
  if(!root) return;
  if(!CU){
    root.innerHTML=`<div class="auth-bg"><div class="auth-card"><div class="auth-brand">FabricFlow Pro</div><div class="tab-strip"><button class="tab-btn on" data-tab="login" onclick="switchAuthTab('login')">Login</button><button class="tab-btn" data-tab="register" onclick="switchAuthTab('register')">Register</button></div><div id="lf"><div class="fld"><label>Mobile/Email</label><input id="l-id" placeholder="9999999999"></div><div class="fld"><label>Password</label><input type="password" id="l-pw"></div><div class="err-msg" id="l-err"></div><button class="auth-btn" onclick="doLogin()">Login</button><p style="margin-top:13px;font-size:.7rem;text-align:center">Admin: 9999999999 / admin123</p></div><div id="rf" style="display:none"><div class="fld"><label>Full Name</label><input id="r-name"></div><div class="fld"><label>Mobile (10 digits)</label><input id="r-mob" maxlength="10"></div><div class="fld"><label>Email</label><input id="r-email"></div><div class="fld"><label>Password (min 6)</label><input type="password" id="r-pw"></div><div class="fld"><label>Role</label><select id="r-role"><option value="subadmin">Sub Admin</option><option value="broker">Broker</option><option value="customer">Customer</option></select></div><div class="err-msg" id="r-err"></div><button class="auth-btn" onclick="doRegister()">Register</button></div></div></div>`;
    return;
  }
  const navItems = [{id:'dashboard',icon:'⊞',label:'Dashboard'},{id:'catalog',icon:'◈',label:'Fabrics'},{id:'stock',icon:'▦',label:'Stock'},(CU.role==='admin'?{id:'users',icon:'◉',label:'Users'}:null),{id:'settings',icon:'◎',label:'Settings'}].filter(Boolean);
  let sidebar = `<div class="sidebar" id="sidebar"><div class="sb-head"><div class="sb-brand">FabricFlow Pro</div><span class="sb-co">${esc(DB.company)}</span></div><div class="sb-nav">`+navItems.map(n=>`<div class="nav-item ${PAGE===n.id?'on':''}" onclick="goTo('${n.id}')"><span class="nav-icon">${n.icon}</span>${n.label}</div>`).join('')+`</div><div class="sb-foot"><button class="theme-pill" onclick="toggleTheme()">${isDark?'☀ Light Mode':'🌙 Dark Mode'}</button><div class="user-row"><div class="uavatar">${(CU.fullName?.charAt(0)||'U').toUpperCase()}</div><div><div class="uname">${esc(CU.fullName)}</div><div class="urole">${ROLE_LABELS[CU.role]}</div></div><button class="exit-btn" onclick="logout()">Exit</button></div></div></div><div class="sb-overlay" id="sb-overlay" onclick="closeSidebar()"></div><button class="hamburger" onclick="toggleSidebar()">☰</button>`;
  let mainHtml = PAGE==='dashboard'?pageDashboard():PAGE==='catalog'?pageCatalog():PAGE==='stock'?pageStock():PAGE==='users'?pageUsers():pageSettings();
  root.innerHTML = sidebar + `<div class="main">${mainHtml}</div>`;
}
function goTo(p){ PAGE=p; closeSidebar(); renderApp(); }
function toggleSidebar(){ document.getElementById('sidebar')?.classList.toggle('open'); document.getElementById('sb-overlay')?.classList.toggle('open'); }
function closeSidebar(){ document.getElementById('sidebar')?.classList.remove('open'); document.getElementById('sb-overlay')?.classList.remove('open'); }

window.goTo=goTo; window.toggleSidebar=toggleSidebar; window.closeSidebar=closeSidebar; window.toggleTheme=toggleTheme; window.doLogin=doLogin; window.doRegister=doRegister; window.switchAuthTab=switchAuthTab; window.logout=logout; window.approveUser=approveUser; window.rejectUser=rejectUser; window.deactivateUser=deactivateUser; window.activateUser=activateUser; window.showAddFabricModal=showAddFabricModal; window.submitAddFabric=submitAddFabric; window.addImageRow=addImageRow; window.editFabricModal=editFabricModal; window.saveEditFabric=saveEditFabric; window.deleteFabric=deleteFabric; window.viewFabric=viewFabric; window.shareFabricWA=shareFabricWA; window.exportFabricsCSV=exportFabricsCSV; window.closeModal=closeModal;

initDB();

<body>
<div id="root"></div>
<div id="toast-root"></div>

<script>
// ============================================================
// FABRICFLOW PRO - FIXED: USER REGISTRATION PENDING APPROVAL & THEME PERSISTENCE
// ============================================================

const esc = s => { if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
const san = (s, n=200) => s ? String(s).trim().slice(0,n) : '';
const uid = () => crypto.randomUUID ? crypto.randomUUID() : (Date.now().toString(36)+Math.random().toString(36).substr(2));
const genSalt = () => { const a=new Uint8Array(16); crypto.getRandomValues(a); return Array.from(a,b=>b.toString(16).padStart(2,'0')).join(''); };
const hashPass = async (p,s) => { const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(p+s)); return Array.from(new Uint8Array(b),x=>x.toString(16).padStart(2,'0')).join(''); };
const validMob = m => /^[6-9][0-9]{9}$/.test(m);
const validEmail = e => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);

function showToast(msg,type='ok'){
  const el=document.createElement('div'); el.className=`toast toast-${type}`; el.textContent=msg;
  document.getElementById('toast-root').appendChild(el);
  setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),300);},2600);
}

const ROLE_LABELS = {admin:'Admin',subadmin:'Sub Admin',broker:'Broker/Agent',customer:'Customer'};
const isAdmin = () => CU?.role === 'admin';
const isSubAdmin = () => CU?.role === 'subadmin';
const isAdminLike = () => ['admin','subadmin'].includes(CU?.role);
const canEdit = () => CU?.role === 'admin';
const isAdminOrSubAdmin = () => ['admin','subadmin'].includes(CU?.role);

let DB={users:[],fabrics:[],logs:[],company:'FabricFlow'};
let CU=null, PAGE='dashboard', STOCK={}, IMGS={}, isDark=true;
let MASTER_TOKEN = '';
let GIST_ID = '';

// Persistent Theme: load from localStorage and apply
function applyTheme(){
  const savedTheme = localStorage.getItem('ff_theme');
  isDark = savedTheme !== null ? savedTheme === 'dark' : true;
  if(isDark) document.documentElement.setAttribute('data-theme','dark');
  else document.documentElement.removeAttribute('data-theme');
}
function toggleTheme(){ 
  isDark = !isDark; 
  localStorage.setItem('ff_theme', isDark ? 'dark' : 'light'); 
  applyTheme(); 
  renderApp(); 
}
applyTheme();

// Gist / Npoint stub - fallback localStorage only (simple fully functional offline-first)
const NPIO_URL = 'https://api.npoint.io/ea7b9700322ea640a188';
async function loadCredentialsFromNpoint(){
  try{
    const res = await fetch(NPIO_URL, {cache:'no-cache'});
    if(res.ok){
      const data = await res.json();
      if(data.gistId && data.token){
        GIST_ID = data.gistId;
        MASTER_TOKEN = data.token;
        return true;
      }
    }
  } catch(e){}
  return false;
}

function loadFromLocalStorage(){
  try{
    const u=localStorage.getItem('ff_users'); if(u) DB.users=JSON.parse(u);
    const f=localStorage.getItem('ff_fabrics'); if(f) DB.fabrics=JSON.parse(f);
    const l=localStorage.getItem('ff_logs'); if(l) DB.logs=JSON.parse(l);
    const c=localStorage.getItem('ff_company'); if(c) DB.company=c;
    const s=localStorage.getItem('ff_stock'); if(s) STOCK=JSON.parse(s);
    const i=localStorage.getItem('ff_imgs'); if(i) IMGS=JSON.parse(i);
    return true;
  } catch(e){ return false; }
}

function scheduleSave(){
  localStorage.setItem('ff_users', JSON.stringify(DB.users));
  localStorage.setItem('ff_fabrics', JSON.stringify(DB.fabrics));
  localStorage.setItem('ff_logs', JSON.stringify(DB.logs.slice(0,500)));
  localStorage.setItem('ff_company', DB.company);
  localStorage.setItem('ff_stock', JSON.stringify(STOCK));
  localStorage.setItem('ff_imgs', JSON.stringify(IMGS));
}

function addLog(action,details){
  DB.logs.unshift({id:uid(),userId:CU?.id||'sys',userName:CU?.fullName||'System',action,details,time:new Date().toLocaleString()});
  if(DB.logs.length>500) DB.logs=DB.logs.slice(0,500);
  scheduleSave();
}

async function initDB(){
  // First load localStorage
  loadFromLocalStorage();
  
  // Ensure admin exists
  if(DB.users.length === 0){
    const salt=genSalt();
    const hash=await hashPass('admin123',salt);
    DB.users=[{id:uid(),fullName:'Master Admin',mobile:'9999999999',email:'admin@fabricflow.com',password:hash,salt,role:'admin',status:'approved',createdAt:new Date().toLocaleString()}];
    scheduleSave();
  }
  
  // Restore session
  const sess = sessionStorage.getItem('ffs');
  if(sess && !CU){
    try{
      const d=JSON.parse(sess);
      const f=DB.users.find(u=>u.id===d.id && u.status==='approved');
      if(f) CU=f;
    } catch(e){}
  }
  
  // Load credentials and try gist (silent background)
  loadCredentialsFromNpoint().catch(()=>{});
  
  const loader = document.getElementById('app-loader');
  if(loader) loader.remove();
  renderApp();
}

// ========== AUTH ==========
async function doLogin(){
  const id=document.getElementById('l-id').value.trim();
  const pw=document.getElementById('l-pw').value;
  const err=document.getElementById('l-err');
  err.classList.remove('on');
  if(!id||!pw){ err.textContent='All fields required'; err.classList.add('on'); return; }
  const user=DB.users.find(u=>u.mobile===id||u.email===id);
  if(!user){ err.textContent='User not found'; err.classList.add('on'); return; }
  if(user.status!=='approved'){ err.textContent=user.status==='pending'?'⏳ Pending admin approval. Please wait for admin to activate.':'Account deactivated'; err.classList.add('on'); return; }
  const hash=await hashPass(pw,user.salt);
  if(hash!==user.password){ err.textContent='Wrong password'; err.classList.add('on'); return; }
  CU=user;
  sessionStorage.setItem('ffs',JSON.stringify({id:user.id}));
  addLog('LOGIN',user.role);
  PAGE='dashboard';
  renderApp();
  showToast(`Welcome back, ${CU.fullName}`);
}

async function doRegister(){
  const name=san(document.getElementById('r-name').value,100);
  const mob=san(document.getElementById('r-mob').value,10);
  const email=san(document.getElementById('r-email').value,100);
  const pw=document.getElementById('r-pw').value;
  const role=document.getElementById('r-role').value;
  const err=document.getElementById('r-err');
  err.classList.remove('on');
  if(!name||!mob||!pw){ err.textContent='All fields required'; err.classList.add('on'); return; }
  if(!validMob(mob)){ err.textContent='Invalid mobile (10 digits, start 6-9)'; err.classList.add('on'); return; }
  if(email&&!validEmail(email)){ err.textContent='Invalid email format'; err.classList.add('on'); return; }
  if(pw.length<6){ err.textContent='Password min 6 characters'; err.classList.add('on'); return; }
  if(DB.users.find(u=>u.mobile===mob)){ err.textContent='Mobile already registered'; err.classList.add('on'); return; }
  const salt=genSalt(), hash=await hashPass(pw,salt);
  const newUser = {id:uid(),fullName:name,mobile:mob,email:email||'',password:hash,salt,role,status:'pending',createdAt:new Date().toLocaleString()};
  DB.users.push(newUser);
  scheduleSave();
  addLog('REGISTER',`${name} as ${role} (PENDING)`);
  showToast(`Registered successfully! Awaiting admin approval.`);
  switchAuthTab('login');
  renderApp();
}

function logout(){
  sessionStorage.removeItem('ffs');
  CU=null;
  renderApp();
}

function switchAuthTab(t){
  const lf=document.getElementById('lf'); const rf=document.getElementById('rf');
  if(lf) lf.style.display=t==='login'?'block':'none';
  if(rf) rf.style.display=t==='register'?'block':'none';
  document.querySelectorAll('.tab-btn').forEach(el=>el.classList.toggle('on',el.dataset.tab===t));
}

// ========== USER MANAGEMENT (ADMIN PANEL VISIBLE & FUNCTIONAL) ==========
function approveUser(id){ 
  const u=DB.users.find(u=>u.id===id); 
  if(u){u.status='approved';scheduleSave();addLog('APPROVE',u.fullName);showToast(`✅ ${u.fullName} approved, can now login.`);renderApp();} 
}
function rejectUser(id){ 
  const u=DB.users.find(u=>u.id===id); 
  DB.users=DB.users.filter(u=>u.id!==id); 
  scheduleSave(); addLog('REJECT',u?.fullName||id); showToast(`❌ ${u?.fullName} rejected and removed.`,'err'); renderApp(); 
}
function deactivateUser(id){ const u=DB.users.find(u=>u.id===id); if(u&&u.role!=='admin'){u.status='inactive';scheduleSave();addLog('DEACTIVATE',u.fullName);showToast(`${u.fullName} deactivated`);renderApp();} }
function activateUser(id){ const u=DB.users.find(u=>u.id===id); if(u){u.status='approved';scheduleSave();addLog('ACTIVATE',u.fullName);showToast(`${u.fullName} activated`);renderApp();} }

// ========== STOCK / FABRIC HELPERS ==========
function parseStockJSON(json){
  if(!Array.isArray(json)) throw new Error('Expected JSON array');
  const stock={};
  json.forEach(row=>{
    let name = row.fabric || row.Fabric || row["Item Name"] || row["ITEM NAME"];
    let design = row.design || row.Design || row["Design / Color No"];
    let qty = row.qty || row.Qty || row.Quantity || row["Quantity"];
    let unit = row.unit || row.Unit || "Rolls";
    let comment = row.comment || row.Comment || "";
    if(!name) return;
    name = name.toString().trim().toUpperCase();
    design = design ? design.toString().trim() : "MAIN";
    qty = parseFloat(qty) || 0;
    if(!stock[name]) stock[name]=[];
    stock[name].push({design, qty, unit, comment});
  });
  return stock;
}

function getStockFor(name){ if(!name) return null; const u=name.toUpperCase().trim(); return STOCK[u] || null; }
function updateStockQuantity(fabricName, newQty){
  if(!isAdminOrSubAdmin()) return;
  const qty=parseInt(newQty) || 0;
  const up=fabricName.toUpperCase().trim();
  if(STOCK[up]){ STOCK[up][0].qty = qty; }
  else { STOCK[up] = [{ design: 'MAIN', qty: qty, unit: 'Rolls', comment: '' }]; }
  scheduleSave();
  addLog('UPDATE_STOCK', `${fabricName} → ${qty} Rolls`);
  showToast(`${fabricName} stock updated to ${qty}`);
  renderApp();
}

function addFabric(d){
  if(!d.sn||!d.name){ showToast('SN & Name required','err'); return false; }
  if(DB.fabrics.some(f=>f.sn===d.sn || f.name.toLowerCase()===d.name.toLowerCase())){ showToast('Duplicate SN or Name','err'); return false; }
  DB.fabrics.push({id:uid(), sn:san(d.sn,20), name:san(d.name,80), cat:san(d.cat||'',50),
    gsm:san(d.gsm||'',30), width:san(d.width||'',30), comp:san(d.comp||'',100),
    hf:san(d.hf||'',20), rate:san(d.rate||'',30)});
  scheduleSave();
  addLog('ADD_FABRIC',`${d.sn} - ${d.name}`);
  showToast(`Added ${d.name}`);
  renderApp(); return true;
}

function deleteFabric(id){ const f=DB.fabrics.find(f=>f.id===id); if(f && confirm(`Delete "${f.name}"?`)){ DB.fabrics=DB.fabrics.filter(f=>f.id!==id); delete IMGS[id]; scheduleSave(); addLog('DELETE_FABRIC',f.name); showToast(`Deleted ${f.name}`,'err'); renderApp(); } }

const getImages = id => IMGS[id]||[];
function saveImages(id,urls){ const valid=urls.map(u=>san(u,500)).filter(u=>u.startsWith('http')); if(valid.length) IMGS[id]=valid; else delete IMGS[id]; scheduleSave(); }

function getCategoryList(){ const used=[...new Set(DB.fabrics.map(f=>f.cat||'').filter(Boolean))]; const adminCats=JSON.parse(localStorage.getItem('ff_cats')||'[]'); const all=[...new Set([...adminCats,...used])].sort(); return all.length ? all : ['Suiting','Shirting','Ladies','Children']; }

function showAddFabricModal(){ if(!canEdit()) return; const cats=getCategoryList(); openModal(`<div class="modal-box"><div class="modal-title">Add Fabric</div><div class="modal-fld"><label>SN *</label><input id="add-sn"></div><div class="modal-fld"><label>Name *</label><input id="add-name"></div><div class="modal-fld"><label>Category</label><input id="add-cat" list="cat-list-dl"><datalist id="cat-list-dl">${cats.map(x=>`<option value="${esc(x)}">`).join('')}</datalist></div><div class="modal-fld"><label>GSM</label><input id="add-gsm"></div><div class="modal-fld"><label>Width</label><input id="add-width"></div><div class="modal-fld"><label>Composition</label><input id="add-comp"></div><div class="modal-fld"><label>Rate</label><input id="add-rate"></div><div><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span>Image URLs</span><button class="btn btn-sm btn-sky" onclick="addImageRow()">+ Add URL</button></div><div id="img-url-list"></div></div><div class="modal-foot"><button class="btn btn-gold" onclick="submitAddFabric()">Create</button><button class="btn btn-ghost" onclick="closeModal()">Cancel</button></div></div>`); }
function submitAddFabric(){ const ok=addFabric({ sn:document.getElementById('add-sn')?.value.trim(), name:document.getElementById('add-name')?.value.trim(), cat:document.getElementById('add-cat')?.value, gsm:document.getElementById('add-gsm')?.value, width:document.getElementById('add-width')?.value, comp:document.getElementById('add-comp')?.value, hf:'', rate:document.getElementById('add-rate')?.value }); if(ok){ const _nf=DB.fabrics[DB.fabrics.length-1]; const l=document.getElementById('img-url-list'); const urls=[]; if(l) l.querySelectorAll('input').forEach(i=>{const v=(i.value||'').trim();if(v.startsWith('http'))urls.push(v);}); if(urls.length) saveImages(_nf.id,urls); closeModal(); renderApp(); } }
function addImageRow(){ const l=document.getElementById('img-url-list'); if(l){ const d=document.createElement('div'); d.className='img-url-row'; d.innerHTML=`<input placeholder="https://..."><button class="btn btn-sm btn-red" onclick="this.parentElement.remove()">Remove</button>`; l.appendChild(d); } }

function editFabricModal(id){ const f=DB.fabrics.find(f=>f.id===id); if(!f||!canEdit()) return; const imgs=getImages(id); const irows=imgs.map(u=>`<div class="img-url-row"><input value="${esc(u)}" placeholder="https://..."><button class="btn btn-sm btn-red" onclick="this.parentElement.remove()">Remove</button></div>`).join(''); openModal(`<div class="modal-box"><div class="modal-title">Edit ${esc(f.name)}</div><div class="modal-fld"><label>SN</label><input id="ed-sn" value="${esc(f.sn)}"></div><div class="modal-fld"><label>Name</label><input id="ed-name" value="${esc(f.name)}"></div><div class="modal-fld"><label>Category</label><input id="ed-cat" value="${esc(f.cat||'')}"></div><div class="modal-fld"><label>GSM</label><input id="ed-gsm" value="${esc(f.gsm||'')}"></div><div class="modal-fld"><label>Width</label><input id="ed-width" value="${esc(f.width||'')}"></div><div class="modal-fld"><label>Composition</label><input id="ed-comp" value="${esc(f.comp||'')}"></div><div class="modal-fld"><label>Rate</label><input id="ed-rate" value="${esc(f.rate||'')}"></div><div><div class="img-gallery" id="img-gallery-edit"><div id="img-url-list">${irows}</div><button class="btn btn-sm btn-sky" onclick="addImageRow()">+ Add URL</button></div></div><div class="modal-foot"><button class="btn btn-gold" onclick="saveEditFabric('${id}')">Save</button><button class="btn btn-ghost" onclick="closeModal()">Cancel</button></div></div>`); }
function saveEditFabric(id){ const sn=document.getElementById('ed-sn')?.value.trim(); const name=document.getElementById('ed-name')?.value.trim(); if(!sn||!name){ showToast('SN and Name required','err'); return; } const i=DB.fabrics.findIndex(f=>f.id===id); if(i!==-1){ DB.fabrics[i]={...DB.fabrics[i], sn, name, cat:document.getElementById('ed-cat')?.value||'', gsm:document.getElementById('ed-gsm')?.value||'', width:document.getElementById('ed-width')?.value||'', comp:document.getElementById('ed-comp')?.value||'', hf:DB.fabrics[i].hf, rate:document.getElementById('ed-rate')?.value||''}; const l=document.getElementById('img-url-list'); const urls=[]; if(l) l.querySelectorAll('input').forEach(inp=>{const v=san(inp.value,500);if(v&&v.startsWith('http'))urls.push(v);}); saveImages(id,urls); scheduleSave(); addLog('EDIT_FABRIC',`${sn} - ${name}`); showToast('Fabric updated'); renderApp(); } closeModal(); }

function viewFabric(id){ const f=DB.fabrics.find(f=>f.id===id); if(!f) return; const stock=getStockFor(f.name); const imgs=getImages(id); openModal(`<div class="modal-box"><div class="modal-title">${esc(f.name)}</div><div>SN: ${esc(f.sn)} | Cat: ${esc(f.cat||'-')}</div><div>GSM: ${esc(f.gsm||'-')} Width: ${esc(f.width||'-')}</div><div>Rate: <span class="gold">${esc(f.rate||'-')}</span></div>${imgs.length?`<div class="img-gallery">${imgs.map(u=>`<img src="${esc(u)}" class="img-thumb" onclick="window.open('${esc(u)}','_blank')">`).join('')}</div>`:''}<div class="modal-foot"><button class="btn btn-green" onclick="shareFabricWA('${f.id}');closeModal()">Share WhatsApp</button><button class="btn btn-ghost" onclick="closeModal()">Close</button></div></div>`); }
function shareFabricWA(id){ const f=DB.fabrics.find(f=>f.id===id); if(!f) return; window.open(`https://wa.me/?text=${encodeURIComponent(`${DB.company}\n${f.name}\nSN:${f.sn}\nRate:${f.rate}`)}`,'_blank'); addLog('WA_SHARE',f.name); }

function exportFabricsCSV(){ const rows=DB.fabrics.map(f=>[f.sn,f.name,f.gsm,f.width,f.comp,f.hf,f.rate,f.cat||''].map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')); const csv='\uFEFF'+['SN,NAME,GSM,WIDTH,COMPOSITION,HF,RATE,CATEGORY',...rows].join('\n'); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download=`fabrics_${Date.now()}.csv`; a.click(); showToast(`Exported ${DB.fabrics.length} fabrics`); }

function pageUsers(){ if(!isAdmin()) return `<div class="page-head"><div class="page-title">Access Denied</div></div>`; const pending=DB.users.filter(u=>u.status==='pending'); const active=DB.users.filter(u=>u.status==='approved'&&u.role!=='admin'); const inactive=DB.users.filter(u=>u.status==='inactive'); const rowHtml = u => `<tr><td><strong>${esc(u.fullName)}</strong><br><span style="font-size:.7rem">${esc(u.email||'—')}</span></td><td>${esc(u.mobile)}</td><td><span class="badge b-${u.role}">${ROLE_LABELS[u.role]||u.role}</span></td><td><span class="sdot ${u.status==='approved'?'d-green':u.status==='pending'?'d-orange':'d-red'}"></span>${u.status}</td><td>${esc(u.createdAt||'—')}</td><td class="btn-row">${u.status==='pending'?`<button class="btn btn-sm btn-green" onclick="approveUser('${u.id}')">Approve</button><button class="btn btn-sm btn-red" onclick="rejectUser('${u.id}')">Reject</button>`:''}${u.status==='approved'&&u.role!=='admin'?`<button class="btn btn-sm btn-red" onclick="deactivateUser('${u.id}')">Deactivate</button>`:''}${u.status==='inactive'?`<button class="btn btn-sm btn-green" onclick="activateUser('${u.id}')">Activate</button>`:''}</td></tr>`; return `<div class="page-head"><div class="page-title">User Management</div><div class="page-sub">${DB.users.length} total users · Pending approval: ${pending.length}</div></div><div class="card"><div class="card-head"><span class="card-title">⏳ Pending Approvals (${pending.length})</span></div><div class="tbl-wrap"><table><thead><tr><th>Name</th><th>Mobile</th><th>Role</th><th>Status</th><th>Registered</th><th>Action</th></tr></thead><tbody>${pending.map(rowHtml).join('')||'<tr><td colspan="6">No pending approvals</td></tr>'}</tbody></table></div></div><div class="card"><div class="card-head"><span class="card-title">✅ Active Users</span></div><div class="tbl-wrap"><table><thead><tr><th>Name</th><th>Mobile</th><th>Role</th><th>Status</th><th>Registered</th><th>Action</th></tr></thead><tbody>${active.map(rowHtml).join('')||'<tr><td colspan="6">No active users</td></tr>'}</tbody></table></div></div><div class="card"><div class="card-head"><span class="card-title">🚫 Inactive Users</span></div><div class="tbl-wrap"><table><thead><tr><th>Name</th><th>Mobile</th><th>Role</th><th>Status</th><th>Registered</th><th>Action</th></tr></thead><tbody>${inactive.map(rowHtml).join('')||'<tr><td colspan="6">No inactive users</td></tr>'}</tbody></table></div></div>`; }

function pageDashboard(){ const pending=DB.users.filter(u=>u.status==='pending').length; const tStk=Object.values(STOCK).reduce((a,b)=>a+b.reduce((x,y)=>x+(typeof y.qty==='number'?y.qty:0),0),0); return `<div class="page-head"><div class="page-title">Dashboard</div><div class="page-sub">Welcome, ${esc(CU.fullName)}</div></div><div class="kpi-row"><div class="kpi"><div class="kpi-label">Fabrics</div><div class="kpi-val gold">${DB.fabrics.length}</div></div><div class="kpi"><div class="kpi-label">Stock Types</div><div class="kpi-val grn">${Object.keys(STOCK).length}</div></div><div class="kpi"><div class="kpi-label">Total Stock</div><div class="kpi-val blu">${tStk.toLocaleString('en-IN')}</div></div><div class="kpi"><div class="kpi-label">Pending Users</div><div class="kpi-val ${pending>0?'rd':'grn'}">${pending}</div></div></div><div class="card"><div class="card-head"><span class="card-title">Quick Actions</span></div><div class="btn-row"><button class="btn btn-gold" onclick="goTo('catalog')">📋 Manage Fabrics</button><button class="btn btn-blue" onclick="goTo('users')">👥 Approve Users</button><button class="btn btn-sky" onclick="goTo('stock')">▦ View Stock</button></div></div>`; }

function pageCatalog(){ const search=document.getElementById('cat-search')?.value?.toLowerCase()||''; const filtered=DB.fabrics.filter(f=>f.name.toLowerCase().includes(search)||(f.sn||'').toLowerCase().includes(search)); return `<div class="page-head"><div class="page-title">Fabric Catalog</div></div><div class="card"><div class="card-head"><span class="card-title">All Fabrics</span><div class="btn-row">${canEdit()?`<button class="btn btn-gold btn-sm" onclick="showAddFabricModal()">+ Add Fabric</button><button class="btn btn-ghost btn-sm" onclick="exportFabricsCSV()">Export CSV</button>`:''}</div></div><div class="search-wrap"><span class="search-ico">⌕</span><input id="cat-search" placeholder="Search..." oninput="renderApp()"></div><div class="tbl-wrap"><table><thead><tr><th>SN</th><th>Name</th><th>Rate</th><th>Actions</th></tr></thead><tbody>${filtered.map(f=>`<tr><td>${esc(f.sn)}</td><td><strong class="gold" style="cursor:pointer" onclick="viewFabric('${f.id}')">${esc(f.name)}</strong></td><td>${esc(f.rate||'-')}</td><td class="btn-row"><button class="btn btn-sm btn-green" onclick="shareFabricWA('${f.id}')">Share</button>${canEdit()?`<button class="btn btn-sm btn-ghost" onclick="editFabricModal('${f.id}')">Edit</button><button class="btn btn-sm btn-red" onclick="deleteFabric('${f.id}')">Del</button>`:''}</td></tr>`).join('')||'<tr><td colspan="4">No fabrics</td></tr>'}</tbody></table></div></div>`; }

function pageStock(){ return `<div class="page-head"><div class="page-title">Stock Inventory</div></div><div class="card"><div class="tbl-wrap"><table><thead><tr><th>Fabric</th><th>Variants</th><th>Total Qty</th></tr></thead><tbody>${Object.keys(STOCK).map(k=>`<tr><td>${esc(k)}</td><td>${STOCK[k].length}</td><td>${STOCK[k].reduce((a,b)=>a+(b.qty||0),0)}</td></tr>`).join('')||'<tr><td colspan="3">No stock synced</td></tr>'}</tbody></table></div></div>`; }

function pageSettings(){ return `<div class="page-head"><div class="page-title">Settings</div></div><div class="card"><button class="btn btn-ghost" onclick="toggleTheme()">${isDark?'Switch to Light Mode':'Switch to Dark Mode'}</button><div style="margin-top:16px"><button class="btn btn-red" onclick="logout()">Logout</button></div></div>`; }

function pageGitHubStock(){ return `<div class="page-head"><div class="page-title">GitHub Sync</div></div><div class="card"><div class="info-box">🔧 Demo: Use local storage stock. To enable auto-sync, configure raw JSON URL. For now stock manually managed.</div><button class="btn btn-sky" onclick="showToast('Stock demo mode active, add stock via CSV or manual')">Manual Stock Info</button></div>`; }

function openModal(html){ let ov=document.getElementById('modal-ov'); if(!ov){ ov=document.createElement('div'); ov.id='modal-ov'; ov.className='modal-bg'; ov.onclick=e=>{if(e.target===ov)closeModal();}; document.body.appendChild(ov); } ov.innerHTML=html; ov.style.display='flex'; }
function closeModal(){ const ov=document.getElementById('modal-ov'); if(ov) ov.style.display='none'; }

function renderApp(){
  const root=document.getElementById('root');
  if(!root) return;
  if(!CU){
    root.innerHTML=`<div class="auth-bg"><div class="auth-card"><div class="auth-brand">FabricFlow Pro</div><div class="tab-strip"><button class="tab-btn on" data-tab="login" onclick="switchAuthTab('login')">Login</button><button class="tab-btn" data-tab="register" onclick="switchAuthTab('register')">Register</button></div><div id="lf"><div class="fld"><label>Mobile/Email</label><input id="l-id" placeholder="9999999999"></div><div class="fld"><label>Password</label><input type="password" id="l-pw"></div><div class="err-msg" id="l-err"></div><button class="auth-btn" onclick="doLogin()">Login</button><p style="margin-top:13px;font-size:.7rem;text-align:center">Admin: 9999999999 / admin123</p></div><div id="rf" style="display:none"><div class="fld"><label>Full Name</label><input id="r-name"></div><div class="fld"><label>Mobile (10 digits)</label><input id="r-mob" maxlength="10"></div><div class="fld"><label>Email</label><input id="r-email"></div><div class="fld"><label>Password (min 6)</label><input type="password" id="r-pw"></div><div class="fld"><label>Role</label><select id="r-role"><option value="subadmin">Sub Admin</option><option value="broker">Broker</option><option value="customer">Customer</option></select></div><div class="err-msg" id="r-err"></div><button class="auth-btn" onclick="doRegister()">Register</button></div></div></div>`;
    return;
  }
  const navItems = [{id:'dashboard',icon:'⊞',label:'Dashboard'},{id:'catalog',icon:'◈',label:'Fabrics'},{id:'stock',icon:'▦',label:'Stock'},(CU.role==='admin'?{id:'users',icon:'◉',label:'Users'}:null),{id:'settings',icon:'◎',label:'Settings'}].filter(Boolean);
  let sidebar = `<div class="sidebar" id="sidebar"><div class="sb-head"><div class="sb-brand">FabricFlow Pro</div><span class="sb-co">${esc(DB.company)}</span></div><div class="sb-nav">`+navItems.map(n=>`<div class="nav-item ${PAGE===n.id?'on':''}" onclick="goTo('${n.id}')"><span class="nav-icon">${n.icon}</span>${n.label}</div>`).join('')+`</div><div class="sb-foot"><button class="theme-pill" onclick="toggleTheme()">${isDark?'☀ Light Mode':'🌙 Dark Mode'}</button><div class="user-row"><div class="uavatar">${(CU.fullName?.charAt(0)||'U').toUpperCase()}</div><div><div class="uname">${esc(CU.fullName)}</div><div class="urole">${ROLE_LABELS[CU.role]}</div></div><button class="exit-btn" onclick="logout()">Exit</button></div></div></div><div class="sb-overlay" id="sb-overlay" onclick="closeSidebar()"></div><button class="hamburger" onclick="toggleSidebar()">☰</button>`;
  let mainHtml = PAGE==='dashboard'?pageDashboard():PAGE==='catalog'?pageCatalog():PAGE==='stock'?pageStock():PAGE==='users'?pageUsers():pageSettings();
  root.innerHTML = sidebar + `<div class="main">${mainHtml}</div>`;
}
function goTo(p){ PAGE=p; closeSidebar(); renderApp(); }
function toggleSidebar(){ document.getElementById('sidebar')?.classList.toggle('open'); document.getElementById('sb-overlay')?.classList.toggle('open'); }
function closeSidebar(){ document.getElementById('sidebar')?.classList.remove('open'); document.getElementById('sb-overlay')?.classList.remove('open'); }

window.goTo=goTo; window.toggleSidebar=toggleSidebar; window.closeSidebar=closeSidebar; window.toggleTheme=toggleTheme; window.doLogin=doLogin; window.doRegister=doRegister; window.switchAuthTab=switchAuthTab; window.logout=logout; window.approveUser=approveUser; window.rejectUser=rejectUser; window.deactivateUser=deactivateUser; window.activateUser=activateUser; window.showAddFabricModal=showAddFabricModal; window.submitAddFabric=submitAddFabric; window.addImageRow=addImageRow; window.editFabricModal=editFabricModal; window.saveEditFabric=saveEditFabric; window.deleteFabric=deleteFabric; window.viewFabric=viewFabric; window.shareFabricWA=shareFabricWA; window.exportFabricsCSV=exportFabricsCSV; window.closeModal=closeModal;

initDB();
